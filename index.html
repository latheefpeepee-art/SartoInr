<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>24H Salah Clock</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --day-color: #f59e0b;
      --night-color: #334155;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 12px;
    }

    .widget {
      width: 100%;
      max-width: 380px;
      background: var(--card-bg);
      border-radius: 28px;
      padding: 20px 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 12px;
    }

    .city {
      font-size: 1.1rem;
      font-weight: 700;
      color: #38bdf8;
    }

    .btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: var(--text);
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .search-row {
      display: none;
      width: 100%;
      gap: 6px;
      margin-bottom: 10px;
    }

    .search-row.active { display: flex; }

    .search-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid #475569;
      color: var(--text);
      padding: 6px 10px;
      border-radius: 8px;
      outline: none;
    }

    /* Clock Outer Box */
    .clock-box {
      position: relative;
      width: 320px;
      height: 320px;
    }

    svg {
      width: 100%;
      height: 100%;
    }

    /* Center Info */
    .center-info {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 130px;
      height: 130px;
      background: var(--bg);
      border: 2px solid #334155;
      border-radius: 50%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .next-name {
      font-size: 1.1rem;
      font-weight: 800;
      color: #facc15;
    }

    .countdown {
      font-size: 1rem;
      font-weight: 700;
      color: #f43f5e;
      font-family: monospace;
    }

    .sub-text {
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    /* Bottom Table */
    .prayer-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      width: 100%;
      gap: 4px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #334155;
    }

    .prayer-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 2px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
      border-top: 3px solid var(--p-color, #38bdf8);
    }

    .prayer-item.active {
      background: rgba(56, 189, 248, 0.2);
    }

    .p-name {
      font-size: 0.6rem;
      color: var(--p-color, #38bdf8);
      font-weight: 700;
    }

    .p-time {
      font-size: 0.7rem;
      font-weight: 700;
      margin-top: 2px;
    }

    /* Clock Hands */
    .hand-hour { stroke: #facc15; stroke-width: 7; stroke-linecap: round; }
    .hand-min { stroke: #38bdf8; stroke-width: 3.5; stroke-linecap: round; }
    .hand-sec { stroke: #f43f5e; stroke-width: 1.5; stroke-linecap: round; }

    /* Text on Dial */
    .dial-num { fill: var(--text-muted); font-size: 8px; font-weight: 600; text-anchor: middle; dominant-baseline: central; }
  </style>
</head>
<body>

  <div class="widget">
    <!-- Header -->
    <div class="header">
      <span class="city" id="cityDisplay">Riyadh</span>
      <button class="btn" id="changeCityBtn">Change City</button>
    </div>

    <!-- Search Input -->
    <div class="search-row" id="searchRow">
      <input type="text" id="cityInput" placeholder="Enter City (e.g. London)" />
      <button class="btn" id="saveBtn">Set</button>
    </div>

    <!-- 24-Hour Circular Clock -->
    <div class="clock-box">
      <svg viewBox="0 0 360 360">
        <!-- Outer Dial Background -->
        <circle cx="180" cy="180" r="130" fill="none" stroke="var(--night-color)" stroke-width="10" />

        <!-- Day Arc (Sunrise to Sunset) -->
        <path id="dayArc" fill="none" stroke="var(--day-color)" stroke-width="10" stroke-linecap="round" />

        <!-- 1-24 Hour Numbers -->
        <g id="dialNumbers"></g>

        <!-- Prayer Dots -->
        <g id="prayerDots"></g>

        <!-- Needles (Default pointing UP at 00:00) -->
        <line id="hourHand" class="hand-hour" x1="180" y1="180" x2="180" y2="115" />
        <line id="minHand" class="hand-min" x1="180" y1="180" x2="180" y2="75" />
        <line id="secHand" class="hand-sec" x1="180" y1="180" x2="180" y2="65" />
        <circle cx="180" cy="180" r="6" fill="#facc15" />
      </svg>

      <!-- Center Overlay -->
      <div class="center-info">
        <span class="sub-text">NEXT SALAH</span>
        <span class="next-name" id="nextName">--</span>
        <span class="countdown" id="countdown">00:00:00</span>
        <span class="sub-text" id="targetTime">at --:--</span>
      </div>
    </div>

    <!-- Bottom Prayer Times -->
    <div class="prayer-grid" id="prayerGrid"></div>
  </div>

  <script>
    const COLORS = {
      Fajr: "#38bdf8",     // Sky Blue
      Sunrise: "#facc15",  // Gold
      Dhuhr: "#f97316",    // Orange
      Asr: "#ef4444",      // Red
      Maghrib: "#ec4899",  // Pink
      Isha: "#a855f7"      // Purple
    };

    let city = localStorage.getItem("salah_city") || "Riyadh";
    let timings = null;

    // Helper: Time (HH:MM) to Angle (0° = 12 o'clock top)
    function timeToAngle(timeStr) {
      if (!timeStr) return 0;
      const [h, m] = timeStr.split(":").map(Number);
      return ((h * 60 + m) / 1440) * 360;
    }

    // Helper: Angle to (X, Y) Coordinates
    function getXY(cx, cy, r, angle) {
      const rad = ((angle - 90) * Math.PI) / 180;
      return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
    }

    // Draw 1-24 Numbers on Clock Ring
    function drawDialNumbers() {
      const group = document.getElementById("dialNumbers");
      group.innerHTML = "";
      for (let i = 1; i <= 24; i++) {
        const angle = (i / 24) * 360;
        const pos = getXY(180, 180, 110, angle);
        const txt = document.createElementNS("http://www.w3.org/2000/svg", "text");
        txt.setAttribute("x", pos.x);
        txt.setAttribute("y", pos.y);
        txt.setAttribute("class", "dial-num");
        txt.textContent = i;
        group.appendChild(txt);
      }
    }

    // Draw Day Arc (Sunrise to Sunset)
    function drawDayArc(sunriseAngle, sunsetAngle) {
      const start = getXY(180, 180, 130, sunsetAngle);
      const end = getXY(180, 180, 130, sunriseAngle);
      const largeArc = sunsetAngle - sunriseAngle <= 180 ? "0" : "1";
      const d = `M ${start.x} ${start.y} A 130 130 0 ${largeArc} 0 ${end.x} ${end.y}`;
      document.getElementById("dayArc").setAttribute("d", d);
    }

    // Fetch Prayer Times
    async function loadPrayerTimes() {
      document.getElementById("cityDisplay").textContent = city;
      try {
        const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${encodeURIComponent(city)}&country=&method=4`);
        const data = await res.json();
        if (data.code === 200) {
          timings = data.data.timings;
          renderData();
        }
      } catch (err) {
        console.error(err);
      }
    }

    // Render Dots and Bottom Table
    function renderData() {
      if (!timings) return;

      // 1. Day Arc
      drawDayArc(timeToAngle(timings.Sunrise), timeToAngle(timings.Sunset));

      // 2. Prayer Dots on Dial
      const dotsGroup = document.getElementById("prayerDots");
      dotsGroup.innerHTML = "";
      const keys = ["Fajr", "Sunrise", "Dhuhr", "Asr", "Maghrib", "Isha"];

      keys.forEach((key) => {
        const angle = timeToAngle(timings[key]);
        const pos = getXY(180, 180, 130, angle);
        const dot = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        dot.setAttribute("cx", pos.x);
        dot.setAttribute("cy", pos.y);
        dot.setAttribute("r", "5");
        dot.setAttribute("fill", COLORS[key]);
        dot.setAttribute("id", `dot-${key}`);
        dotsGroup.appendChild(dot);
      });

      // 3. Bottom Table
      const grid = document.getElementById("prayerGrid");
      grid.innerHTML = "";
      keys.forEach((key) => {
        const item = document.createElement("div");
        item.className = "prayer-item";
        item.id = `item-${key}`;
        item.style.setProperty("--p-color", COLORS[key]);
        item.innerHTML = `
          <span class="p-name">${key}</span>
          <span class="p-time">${timings[key]}</span>
        `;
        grid.appendChild(item);
      });
    }

    // Real-time Needles & Countdown Loop
    function startClock() {
      setInterval(() => {
        const now = new Date();
        const hrs = now.getHours();
        const mins = now.getMinutes();
        const secs = now.getSeconds();

        // Needles Rotation
        const hourDeg = ((hrs + mins / 60 + secs / 3600) / 24) * 360;
        const minDeg = ((mins + secs / 60) / 60) * 360;
        const secDeg = (secs / 60) * 360;

        document.getElementById("hourHand").setAttribute("transform", `rotate(${hourDeg}, 180, 180)`);
        document.getElementById("minHand").setAttribute("transform", `rotate(${minDeg}, 180, 180)`);
        document.getElementById("secHand").setAttribute("transform", `rotate(${secDeg}, 180, 180)`);

        if (timings) updateCountdown(now);
      }, 1000);
    }

    // Countdown Logic
    function updateCountdown(now) {
      const keys = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
      let nextKey = null;
      let nextTarget = null;

      for (let key of keys) {
        const [h, m] = timings[key].split(":").map(Number);
        const t = new Date(now);
        t.setHours(h, m, 0, 0);
        if (t > now) {
          nextKey = key;
          nextTarget = t;
          break;
        }
      }

      if (!nextKey) {
        nextKey = "Fajr";
        const [h, m] = timings["Fajr"].split(":").map(Number);
        nextTarget = new Date(now);
        nextTarget.setDate(nextTarget.getDate() + 1);
        nextTarget.setHours(h, m, 0, 0);
      }

      const diff = Math.floor((nextTarget - now) / 1000);
      const pad = (n) => String(n).padStart(2, "0");
      const hh = pad(Math.floor(diff / 3600));
      const mm = pad(Math.floor((diff % 3600) / 60));
      const ss = pad(diff % 60);

      document.getElementById("nextName").textContent = nextKey;
      document.getElementById("nextName").style.color = COLORS[nextKey];
      document.getElementById("countdown").textContent = `-${hh}:${mm}:${ss}`;
      document.getElementById("targetTime").textContent = `at ${timings[nextKey]}`;

      // Highlights
      document.querySelectorAll(".prayer-item").forEach(el => el.classList.remove("active"));
      const activeItem = document.getElementById(`item-${nextKey}`);
      if (activeItem) activeItem.classList.add("active");
    }

    // Event Handlers
    document.getElementById("changeCityBtn").onclick = () => {
      document.getElementById("searchRow").classList.toggle("active");
    };

    document.getElementById("saveBtn").onclick = () => {
      const val = document.getElementById("cityInput").value.trim();
      if (val) {
        city = val;
        localStorage.setItem("salah_city", city);
        document.getElementById("searchRow").classList.remove("active");
        loadPrayerTimes();
      }
    };

    // Init
    drawDialNumbers();
    loadPrayerTimes();
    startClock();
  </script>
</body>
</html>
