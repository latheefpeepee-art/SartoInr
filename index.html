<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMOLED Edge-to-Edge Forex & Salah Dashboard</title>
  <style>
    :root {
      --bg-main: #000000; /* True AMOLED Black to melt into your home screen */
      --glass-panel: rgba(255, 255, 255, 0.04);
      --border-color: rgba(255, 255, 255, 0.08);
      --neon-cyan: #00e5ff;
      --neon-magenta: #ff007f;
      --neon-yellow: #e7c81a;
      --text-white: #ffffff;
      --text-gray: #8e94a0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* absolute 100% viewport consumption with no scrolls */
    body, html {
      width: 100%;
      height: 100vh;
      background: transparent;
      overflow: hidden;
    }

    /* Outer borders and padding set to absolute zero to maximize edge real estate */
    .widget-container {
      width: 100%;
      height: 100%;
      background: var(--bg-main);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2px; /* Ultra-thin margin to prevent launcher clip-offs */
    }

    /* Minimalist High-Density Header Bar */
    .widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 6px;
      background: rgba(255, 255, 255, 0.02);
      border-bottom: 1px solid var(--border-color);
    }

    .meta-geo {
      font-size: clamp(0.7rem, 3.2vw, 0.95rem);
      font-weight: 800;
      color: var(--neon-cyan);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .meta-time {
      font-size: clamp(0.6rem, 2.8vw, 0.8rem);
      font-weight: 600;
      color: var(--text-gray);
    }

    /* Optimized Currency Row: Compact height, ultra-legible elements */
    .forex-row {
      background: var(--glass-panel);
      border: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 10px;
      margin: 2px 0;
      height: 14%; /* Reserved height percentage */
    }

    .pair-badge {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .flag-ico {
      width: clamp(22px, 5.5vw, 28px);
      height: clamp(22px, 5.5vw, 28px);
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid #ffffff;
    }

    .pair-name {
      font-size: clamp(0.85rem, 4vw, 1.15rem);
      font-weight: 900;
      color: var(--text-white);
    }

    /* Scaled down, high-precision currency rate tracking */
    .rate-text {
      font-size: clamp(1.8rem, 8.5vw, 2.7rem);
      font-weight: 950;
      color: var(--neon-cyan);
      letter-spacing: -1px;
      text-align: right;
    }

    /* Salah Matrix Layout: Stretched horizontally and vertically */
    .salah-matrix {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 2px;
      flex-grow: 1;
    }

    .salah-block {
      background: var(--glass-panel);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 6px 2px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .block-name {
      font-size: clamp(0.8rem, 3.8vw, 1.1rem); /* Large bold titles */
      font-weight: 800;
      color: var(--text-gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .block-time {
      font-size: clamp(1.2rem, 5.8vw, 1.85rem); /* Giant, highly legible timings */
      font-weight: 900;
      color: var(--text-white);
      margin-top: 2px;
    }

    /* NEXT SALAH HIGHLIGHT: Highly vibrant edge-to-edge status card */
    .highlighted-active {
      background: linear-gradient(135deg, var(--neon-magenta) 0%, #6366f1 100%) !important;
      border: 1.5px solid var(--neon-magenta) !important;
      box-shadow: inset 0 0 15px rgba(255, 0, 127, 0.4);
    }

    .highlighted-active .block-name {
      color: #ffffff !important;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }

    .highlighted-active .block-time {
      color: var(--neon-yellow) !important; /* Extremely high contrast gold text */
      text-shadow: 0 0 6px rgba(231, 200, 26, 0.6);
    }
  </style>
</head>
<body>

  <div class="widget-container" onclick="manualSyncPipelines()">
    <!-- Top Meta -->
    <div class="widget-header">
      <span class="meta-geo" id="geoMarker">Detecting...</span>
      <span class="meta-time" id="syncTimestamp">Checking...</span>
    </div>

    <!-- Reduced Rate Display -->
    <div class="forex-row">
      <div class="pair-badge">
        <img src="https://flagcdn.com/w80/sa.png" class="flag-ico" alt="Saudi Arabia">
        <img src="https://flagcdn.com/w80/in.png" class="flag-ico" alt="India">
        <span class="pair-name">SAR/INR</span>
      </div>
      <div class="rate-text" id="rateBlock">--.----</div>
    </div>

    <!-- Edge-to-Edge Grid (Large Texts) -->
    <div class="salah-matrix">
      <div class="salah-block" id="box-fajr">
        <span class="block-name">Fajr</span>
        <span class="block-time" id="v-fajr">--:--</span>
      </div>
      <div class="salah-block" id="box-sunrise">
        <span class="block-name">Sunrise</span>
        <span class="block-time" id="v-sunrise">--:--</span>
      </div>
      <div class="salah-block" id="box-dhuhr">
        <span class="block-name">Dhuhr</span>
        <span class="block-time" id="v-dhuhr">--:--</span>
      </div>
      <div class="salah-block" id="box-asr">
        <span class="block-name">Asr</span>
        <span class="block-time" id="v-asr">--:--</span>
      </div>
      <div class="salah-block" id="box-maghrib">
        <span class="block-name">Maghrib</span>
        <span class="block-time" id="v-maghrib">--:--</span>
      </div>
      <div class="salah-block" id="box-isha">
        <span class="block-name">Isha</span>
        <span class="block-time" id="v-isha">--:--</span>
      </div>
    </div>
  </div>

  <script>
    // Pulls from Real-Time aggregate FX pools directly matching XE/Google mid-market variations
    const REAL_TIME_FOREX_URL = 'https://api.exchangerate-api.com/v4/latest/SAR';
    const SALAH_API_BASE = 'https://api.aladhan.com/v1/timings';

    const BASE_LAT_FALLBACK = 24.7136;
    const BASE_LNG_FALLBACK = 46.6753;
    const BASE_CITY_FALLBACK = "Riyadh";

    let cachedTimingsObj = null;

    function applyLocalStorageCache() {
      if (localStorage.getItem('dense_rate')) document.getElementById('rateBlock').textContent = localStorage.getItem('dense_rate');
      if (localStorage.getItem('dense_geo')) document.getElementById('geoMarker').textContent = localStorage.getItem('dense_geo');
      
      const targets = ['fajr', 'sunrise', 'dhuhr', 'asr', 'maghrib', 'isha'];
      let cacheObject = {};
      targets.forEach(item => {
        const value = localStorage.getItem(`dense_val_${item}`);
        if(value) {
          document.getElementById(`v-${item}`).textContent = value;
          const mapKey = item.charAt(0).toUpperCase() + item.slice(1);
          cacheObject[mapKey] = value;
        }
      });
      if (Object.keys(cacheObject).length === 6) {
        cachedTimingsObj = cacheObject;
        markNextSalahHighlight();
      }
      if (localStorage.getItem('dense_sync')) document.getElementById('syncTimestamp').textContent = localStorage.getItem('dense_sync');
    }

    async function manualSyncPipelines() {
      await fetchPrecisionForex();
      await acquirePositionCoordinates();
    }

    async function fetchPrecisionForex() {
      try {
        const response = await fetch(REAL_TIME_FOREX_URL);
        if (!response.ok) throw new Error();
        const data = await response.json();
        const liveRate = data.rates.INR;
        if (liveRate) {
          const precisionString = liveRate.toFixed(4);
          document.getElementById('rateBlock').textContent = precisionString;
          localStorage.setItem('dense_rate', precisionString);
        }
      } catch (err) { console.error('Real-time sync failure', err); }
    }

    async function acquirePositionCoordinates() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => { requestSalahTimings(pos.coords.latitude, pos.coords.longitude, "Auto GPS"); },
          () => { ipFallbackLookup(); },
          { timeout: 5000 }
        );
      } else {
        ipFallbackLookup();
      }
    }

    async function ipFallbackLookup() {
      try {
        const response = await fetch('https://ipapi.co/json/');
        if (!response.ok) throw new Error();
        const locationData = await response.json();
        if (locationData.latitude && locationData.longitude) {
          requestSalahTimings(locationData.latitude, locationData.longitude, locationData.city || "Auto IP");
        } else { throw new Error(); }
      } catch (err) {
        requestSalahTimings(BASE_LAT_FALLBACK, BASE_LNG_FALLBACK, BASE_CITY_FALLBACK);
      }
    }

    async function requestSalahTimings(lat, lng, label) {
      try {
        const currentISO = new Date().toISOString().split('T')[0];
        // Utilizing Method 4 (Umm Al-Qura) optimized for strict regional timing accuracy
        const response = await fetch(`${SALAH_API_BASE}/${currentISO}?latitude=${lat}&longitude=${lng}&method=4`);
        if (!response.ok) throw new Error();
        
        const resultPayload = await response.json();
        const systemTimings = resultPayload.data.timings;
        
        document.getElementById('geoMarker').textContent = label;
        localStorage.setItem('dense_geo', label);

        const localMap = {
          'fajr': systemTimings.Fajr,
          'sunrise': systemTimings.Sunrise,
          'dhuhr': systemTimings.Dhuhr,
          'asr': systemTimings.Asr,
          'maghrib': systemTimings.Maghrib,
          'isha': systemTimings.Isha
        };

        cachedTimingsObj = systemTimings;

        for (const [key, value] of Object.entries(localMap)) {
          if (value) {
            document.getElementById(`v-${key}`).textContent = value;
            localStorage.setItem(`dense_val_${key}`, value);
          }
        }

        markNextSalahHighlight();

        const formattedTime = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        document.getElementById('syncTimestamp').textContent = formattedTime;
        localStorage.setItem('dense_sync', formattedTime);

      } catch (err) { console.error('Salah sync failure', err); }
    }

    function markNextSalahHighlight() {
      if (!cachedTimingsObj) return;

      const currentTime = new Date();
      const prayerPriorityList = [
        { id: 'fajr', time: cachedTimingsObj.Fajr },
        { id: 'dhuhr', time: cachedTimingsObj.Dhuhr },
        { id: 'asr', time: cachedTimingsObj.Asr },
        { id: 'maghrib', time: cachedTimingsObj.Maghrib },
        { id: 'isha', time: cachedTimingsObj.Isha }
      ];

      // Remove previous highlighted selections
      const selectors = ['fajr', 'sunrise', 'dhuhr', 'asr', 'maghrib', 'isha'];
      selectors.forEach(item => {
        const node = document.getElementById(`box-${item}`);
        if(node) node.classList.remove('highlighted-active');
      });

      let targetActiveId = null;

      for (let item of prayerPriorityList) {
        if (!item.time) continue;
        const [hours, minutes] = item.time.split(':').map(Number);
        const prayerDateInstance = new Date(currentTime);
        prayerDateInstance.setHours(hours, minutes, 0, 0);

        if (prayerDateInstance > currentTime) {
          targetActiveId = item.id;
          break;
        }
      }

      // Default back to tomorrow's Fajr if all daily slots have closed
      if (!targetActiveId) {
        targetActiveId = 'fajr';
      }

      const activeNode = document.getElementById(`box-${targetActiveId}`);
      if (activeNode) {
        activeNode.classList.add('highlighted-active');
      }
    }

    // Startup Init Execution
    applyLocalStorageCache();
    manualSyncPipelines();

    // Loop Interval triggers
    setInterval(manualSyncPipelines, 15 * 60 * 1000); // Main pipeline sync (15 min)
    setInterval(markNextSalahHighlight, 60 * 1000); // Highlight validation sync (1 min)
  </script>
</body>
</html>
