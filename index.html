<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- FORCE METRIC FRESHNESS: Completely hard-reloads the widget engine frame every 30 seconds to bypass background sleep -->
  <meta http-equiv="refresh" content="30">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizontal Matrix Core</title>
  <style>
    :root {
      --bg-pure: #000000; /* Deep AMOLED Black */
      --glass-panel: rgba(255, 255, 255, 0.03);
      --border-thin: rgba(255, 255, 255, 0.08);
      --neon-cyan: #00e5ff;
      --neon-magenta: #ff007f;
      --neon-gold: #f1c40f;
      --text-white: #ffffff;
      --text-gray: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body, html {
      width: 100%;
      height: 100vh;
      background: transparent;
      overflow: hidden;
    }

    /* Zero-margin architecture maximizing full screen layout area */
    .widget-root {
      width: 100%;
      height: 100%;
      background: var(--bg-pure);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2px;
    }

    /* Header Panel: Left Countdown & Right Rate in the EXACT same text size */
    .header-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border-thin);
      background: var(--glass-panel);
    }

    .countdown-text, .rate-text {
      /* Identical responsive size pairing text sizing clamp */
      font-size: clamp(1.05rem, 4.6vw, 1.65rem); 
      font-weight: 950;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .countdown-text {
      color: var(--neon-gold);
      text-align: left;
      text-transform: uppercase;
    }

    .rate-text {
      color: var(--neon-cyan);
      text-align: right;
    }

    /* Horizontal Ribbon layout spanning edge-to-edge across the base */
    .salah-horizontal-ribbon {
      display: flex;
      width: 100%;
      flex-grow: 1;
      gap: 2px; /* Ultra-narrow alignment separation lines */
      margin-top: 2px;
    }

    /* Two-line column stacked grid components */
    .salah-column-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--glass-panel);
      border: 1px solid var(--border-thin);
      border-radius: 10px;
      padding: 4px 1px;
      text-align: center;
    }

    /* Line 1: Short Name layout styles */
    .salah-name-line {
      font-size: clamp(0.72rem, 3.2vw, 1.1rem);
      font-weight: 850;
      color: var(--text-gray);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    /* Line 2: Salah Numeric Time layout styles */
    .salah-time-line {
      font-size: clamp(0.88rem, 4vw, 1.4rem);
      font-weight: 950;
      color: var(--text-white);
      line-height: 1;
    }

    .ampm-marker {
      font-size: 0.58em;
      font-weight: 800;
      color: var(--text-gray);
      display: block; /* Stacks AM/PM underneath numbers to defend horizontal column spacing */
      margin-top: 1px;
    }

    /* DYNAMIC ALERT OVERLAY: Hot-magenta highlight frame for your next active tracking target */
    .active-column-highlight {
      background: linear-gradient(180deg, var(--neon-magenta) 0%, rgba(255, 0, 127, 0.08) 100%) !important;
      border: 1.5px solid var(--neon-magenta) !important;
      box-shadow: 0 4px 15px rgba(255, 0, 127, 0.2);
    }

    .active-column-highlight .salah-name-line {
      color: #ffffff !important;
    }

    .active-column-highlight .salah-time-line {
      color: var(--neon-gold) !important;
      text-shadow: 0 0 6px rgba(241, 196, 15, 0.4);
    }

    .active-column-highlight .ampm-marker {
      color: #ffffff !important;
    }
  </style>
</head>
<body>

  <div class="widget-root" onclick="forceManualDataRefresh()">
    <!-- Header: Left/Right Uniform Layout Block -->
    <div class="header-panel">
      <div class="countdown-text" id="liveTickerOutput">NEXT: --:--:--</div>
      <div class="rate-text" id="rateBlock">--.---- SAR/INR</div>
    </div>

    <!-- Horizontal Stack Row Components -->
    <div class="salah-horizontal-ribbon">
      <div class="salah-column-card" id="card-fajr">
        <span class="salah-name-line">Fajr</span>
        <span class="salah-time-line" id="t-fajr">--:--</span>
      </div>
      <div class="salah-column-card" id="card-sunrise">
        <span class="salah-name-line">Sunrise</span>
        <span class="salah-time-line" id="t-sunrise">--:--</span>
      </div>
      <div class="salah-column-card" id="card-dhuhr">
        <span class="salah-name-line">Dhuhr</span>
        <span class="salah-time-line" id="t-dhuhr">--:--</span>
      </div>
      <div class="salah-column-card" id="card-asr">
        <span class="salah-name-line">Asr</span>
        <span class="salah-time-line" id="t-asr">--:--</span>
      </div>
      <div class="salah-column-card" id="card-maghrib">
        <span class="salah-name-line">Maghrib</span>
        <span class="salah-time-line" id="t-maghrib">--:--</span>
      </div>
      <div class="salah-column-card" id="card-isha">
        <span class="salah-name-line">Isha</span>
        <span class="salah-time-line" id="t-isha">--:--</span>
      </div>
    </div>
  </div>

  <script>
    // --- VALUE CALIBRATION MODIFIER ---
    // Public tickers aggregate base interbank pools. If your banking portal or XE app index 
    // prints a different retail layout layer spread, edit this setting to calibrate instantly.
    const HARDWARE_SPREAD_OFFSET = 0.0600; 

    const API_EXCHANGE = 'https://open.er-api.com/v6/latest/SAR';
    const API_SALAH = 'https://api.aladhan.com/v1/timings';

    const LAT_RIYADH = 24.7136;
    const LNG_RIYADH = 46.6753;

    let countdownTargetTimeInstance = null;
    let countdownTargetLabelString = "";
    let localCacheTimingsPointer = null;

    function processTo12HourLayoutString(time24) {
      if (!time24) return '--:--';
      const stripString = time24.split(' ')[0];
      let [h, m] = stripString.split(':').map(Number);
      const standardSuffix = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return `${h}:${m < 10 ? '0' + m : m}<span class="ampm-marker">${standardSuffix}</span>`;
    }

    function recoverWidgetMemoryCache() {
      if (localStorage.getItem('hz_rate')) {
        document.getElementById('rateBlock').textContent = localStorage.getItem('hz_rate') + " SAR/INR";
      }
      
      const identifiers = ['fajr', 'sunrise', 'dhuhr', 'asr', 'maghrib', 'isha'];
      let parsingReconstructor = {};
      identifiers.forEach(id => {
        const val = localStorage.getItem(`hz_t_${id}`);
        if (val) {
          document.getElementById(`t-${id}`).innerHTML = processTo12HourLayoutString(val);
          const uppercaseApiKey = id.charAt(0).toUpperCase() + id.slice(1);
          parsingReconstructor[uppercaseApiKey] = val;
        }
      });
      
      if (Object.keys(parsingReconstructor).length === 6) {
        localCacheTimingsPointer = parsingReconstructor;
        calculateUpcomingSalahHighlight();
      }
    }

    function forceManualDataRefresh() {
      fetchLiveExchangeRates();
      lookupIPGeographicCoordinates();
    }

    async function fetchLiveExchangeRates() {
      try {
        const response = await fetch(API_EXCHANGE);
        if (!response.ok) throw new Error();
        const data = await response.json();
        const rawWholesaleRate = data.rates.INR;
        if (rawWholesaleRate) {
          const processedPrecisionRate = (rawWholesaleRate + HARDWARE_SPREAD_OFFSET).toFixed(4);
          document.getElementById('rateBlock').textContent = processedPrecisionRate + " SAR/INR";
          localStorage.setItem('hz_rate', processedPrecisionRate);
        }
      } catch (err) { console.error("FX sync error logic block", err); }
    }

    async function lookupIPGeographicCoordinates() {
      const controllerNode = new AbortController();
      const backupTimeoutInt = setTimeout(() => controllerNode.abort(), 1500);

      try {
        const response = await fetch('https://ipapi.co/json/', { signal: controllerNode.signal });
        clearTimeout(backupTimeoutInt);
        if (!response.ok) throw new Error();
        const data = await response.json();
        if (data.latitude && data.longitude) {
          executeSalahNetworkPipelineCall(data.latitude, data.longitude);
        } else { throw new Error(); }
      } catch (e) {
        executeSalahNetworkPipelineCall(LAT_RIYADH, LNG_RIYADH); // Direct Riyadh performance backup
      }
    }

    async function executeSalahNetworkPipelineCall(lat, lng) {
      try {
        const datelineISO = new Date().toISOString().split('T')[0];
        // Umm Al-Qura (Method 4) calculation profile explicitly locked
        const response = await fetch(`${API_SALAH}/${datelineISO}?latitude=${lat}&longitude=${lng}&method=4`);
        if (!response.ok) throw new Error();
        
        const packageData = await response.json();
        const timings = packageData.data.timings;
        localCacheTimingsPointer = timings;

        const syncMatrix = {
          'fajr': timings.Fajr, 'sunrise': timings.Sunrise, 'dhuhr': timings.Dhuhr,
          'asr': timings.Asr, 'maghrib': timings.Maghrib, 'isha': timings.Isha
        };

        for (const [key, val] of Object.entries(syncMatrix)) {
          if (val) {
            document.getElementById(`t-${key}`).innerHTML = processTo12HourLayoutString(val);
            localStorage.setItem(`hz_t_${key}`, val);
          }
        }
        calculateUpcomingSalahHighlight();
      } catch (err) { console.error("Salah network sync error line", err); }
    }

    function calculateUpcomingSalahHighlight() {
      if (!localCacheTimingsPointer) return;

      const deviceTimeSnapshot = new Date();
      const prayerTimelineEvaluator = [
        { key: 'fajr', time: localCacheTimingsPointer.Fajr },
        { key: 'dhuhr', time: localCacheTimingsPointer.Dhuhr },
        { key: 'asr', time: localCacheTimingsPointer.Asr },
        { key: 'maghrib', time: localCacheTimingsPointer.Maghrib },
        { key: 'isha', time: localCacheTimingsPointer.Isha }
      ];

      const cards = ['fajr', 'sunrise', 'dhuhr', 'asr', 'maghrib', 'isha'];
      cards.forEach(c => {
        const node = document.getElementById(`card-${c}`);
        if (node) node.classList.remove('active-column-highlight');
      });

      let identifiedNextSalahNode = null;

      for (let item of prayerTimelineEvaluator) {
        if (!item.time) continue;
        const pureTimeStr = item.time.split(' ')[0];
        const [hours, minutes] = pureTimeStr.split(':').map(Number);
        const loopInstanceDate = new Date(deviceTimeSnapshot);
        loopInstanceDate.setHours(hours, minutes, 0, 0);

        if (loopInstanceDate > deviceTimeSnapshot) {
          identifiedNextSalahNode = item;
          countdownTargetTimeInstance = loopInstanceDate;
          break;
        }
      }

      // Rollover validation sweep targeting tomorrow's Fajr window if night cycle closes
      if (!identifiedNextSalahNode) {
        identifiedNextSalahNode = prayerTimelineEvaluator[0];
        const pureTimeStr = identifiedNextSalahNode.time.split(' ')[0];
        const [hours, minutes] = pureTimeStr.split(':').map(Number);
        const tomorrowRolloverDate = new Date(deviceTimeSnapshot);
        tomorrowRolloverDate.setDate(deviceTimeSnapshot.getDate() + 1);
        tomorrowRolloverDate.setHours(hours, minutes, 0, 0);
        countdownTargetTimeInstance = tomorrowRolloverDate;
      }

      countdownTargetLabelString = identifiedNextSalahNode.key.toUpperCase();
      const targetCardElement = document.getElementById(`card-${identifiedNextSalahNode.key}`);
      if (targetCardElement) targetCardElement.classList.add('active-column-highlight');

      executeLiveCountdownTickerEngine();
    }

    function executeLiveCountdownTickerEngine() {
      if (!countdownTargetTimeInstance) return;

      const rightNow = new Date();
      const timeRemainingMs = countdownTargetTimeInstance - rightNow;

      if (timeRemainingMs <= 0) {
        calculateUpcomingSalahHighlight();
        return;
      }

      const conversionSecondsTotal = Math.floor(timeRemainingMs / 1000);
      const hoursOutput = Math.floor(conversionSecondsTotal / 3600);
      const minutesOutput = Math.floor((conversionSecondsTotal % 3600) / 60);
      const secondsOutput = Math.floor(conversionSecondsTotal % 60);

      // Left-aligned continuous precise countdown string
      document.getElementById('liveTickerOutput').textContent = 
        `${countdownTargetLabelString}: -${hoursOutput}h ${minutesOutput}m ${secondsOutput}s`;
    }

    // Execution sequence loops
    recoverWidgetMemoryCache();
    forceManualDataRefresh();

    // Fine-tuned background ticker rendering loops
    setInterval(executeLiveCountdownTickerEngine, 1000);
  </script>
</body>
</html>
