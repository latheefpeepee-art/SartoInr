<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibrant SAR to INR Widget</title>
  <style>
    :root {
      /* Ultra-colorful, modern linear gradient */
      --widget-gradient: linear-gradient(135deg, #4f46e5 0%, #7c3aed 35%, #db2777 70%, #ea580c 100%);
      --card-bg: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.2);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.75);
      --pulse-glow: #22c55e;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body, html {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent; /* Maintains background overlay support in widgets */
      overflow: hidden;
    }

    /* Vibrant container designed to dynamically adapt to home screen scaling */
    .widget-container {
      width: 100%;
      height: 100%;
      padding: 18px;
      background: var(--widget-gradient);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.35);
      position: relative;
    }

    .widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .currency-pairing {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--card-bg);
      padding: 6px 12px;
      border-radius: 50px;
      border: 1px solid var(--glass-border);
    }

    /* Small circular flag styles */
    .flag-circle {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      object-fit: cover;
      border: 1.5px solid #ffffff;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .currency-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.5px;
    }

    .arrow-split {
      color: var(--text-secondary);
      font-size: 0.75rem;
      font-weight: bold;
    }

    .live-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .pulse-dot {
      width: 8px;
      height: 8px;
      background-color: var(--pulse-glow);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--pulse-glow);
      animation: heartBeat 2s infinite;
    }

    @keyframes heartBeat {
      0%, 100% { transform: scale(0.9); opacity: 0.7; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    .refresh-action {
      background: var(--card-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-primary);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: transform 0.1s, background 0.2s;
    }

    .refresh-action:active {
      transform: scale(0.85);
      background: rgba(255, 255, 255, 0.25);
    }

    .widget-body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex-grow: 1;
      padding-left: 4px;
    }

    .rate-wrapper {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-top: 6px;
    }

    /* Fluid typography rules custom-tuned for 4 decimal layouts */
    .rate-value {
      font-size: clamp(2.0rem, 9.5vw, 3.1rem);
      font-weight: 850;
      color: var(--text-primary);
      letter-spacing: -1px;
      line-height: 0.95;
    }

    .rate-suffix {
      font-size: clamp(0.95rem, 4vw, 1.25rem);
      font-weight: 700;
      color: #ffffff;
      opacity: 0.9;
    }

    .label-hint {
      font-size: 0.78rem;
      color: var(--text-secondary);
      font-weight: 500;
      margin-top: 4px;
    }

    .widget-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--text-secondary);
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      padding-top: 8px;
    }

    .spin-animation {
      animation: rotateCube 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes rotateCube {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="widget-container">
    <div class="widget-header">
      <div class="currency-pairing">
        <!-- Saudi Arabia Flag Icon -->
        <img src="https://flagcdn.com/w80/sa.png" class="flag-circle" alt="Saudi Arabia">
        <span class="currency-label">SAR</span>
        <span class="arrow-split">➔</span>
        <!-- India Flag Icon -->
        <img src="https://flagcdn.com/w80/in.png" class="flag-circle" alt="India">
        <span class="currency-label">INR</span>
      </div>
      
      <div class="live-indicator">
        <button class="refresh-action" id="syncBtn" onclick="fetchLiveExchangeRate()">↻</button>
      </div>
    </div>

    <div class="widget-body">
      <div class="rate-wrapper">
        <span class="rate-value" id="rateDisplay">--.----</span>
        <span class="rate-suffix">INR</span>
      </div>
      <div class="label-hint">1 Saudi Riyal Base</div>
    </div>

    <div class="widget-footer">
      <span id="timestampDisplay">Syncing live feed...</span>
      <div class="live-indicator"><span class="pulse-dot"></span>&nbsp;Live</div>
    </div>
  </div>

  <script>
    const TARGET_API = 'https://open.er-api.com/v6/latest/SAR';
    const rateContainer = document.getElementById('rateDisplay');
    const timeContainer = document.getElementById('timestampDisplay');
    const syncBtn = document.getElementById('syncBtn');

    // Retrieve historical storage points to prevent blank UI artifacts on cold starts
    function initializeWidgetFromCache() {
      const savedRate = localStorage.getItem('precision_sar_inr');
      const savedTime = localStorage.getItem('precision_sar_time');
      if (savedRate) rateContainer.textContent = parseFloat(savedRate).toFixed(4);
      if (savedTime) timeContainer.textContent = `Synced: ${savedTime}`;
    }

    async function fetchLiveExchangeRate() {
      syncBtn.classList.add('spin-animation');
      setTimeout(() => syncBtn.classList.remove('spin-animation'), 600);

      try {
        const response = await fetch(TARGET_API);
        if (!response.ok) throw new Error('Network response fault');
        
        const payload = await response.json();
        const rawRate = payload.rates.INR;
        
        if (rawRate) {
          // Locked strict 4 decimal precision processing
          const precisionString = rawRate.toFixed(4);
          rateContainer.textContent = precisionString;
          
          const timeStamp = new Date();
          const localizedTime = timeStamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          timeContainer.textContent = `Synced: ${localizedTime}`;

          localStorage.setItem('precision_sar_inr', precisionString);
          localStorage.setItem('precision_sar_time', localizedTime);
        }
      } catch (exception) {
        console.error('Data sync failed:', exception);
        if (!localStorage.getItem('precision_sar_inr')) {
          rateContainer.textContent = '00.0000';
          timeContainer.textContent = 'Offline';
        }
      }
    }

    // Execution sequence
    initializeWidgetFromCache();
    fetchLiveExchangeRate();

    // Constant 15-minute background polling interval loop
    setInterval(fetchLiveExchangeRate, 15 * 60 * 1000);
  </script>
</body>
</html>
