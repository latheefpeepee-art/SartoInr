<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAR to INR Widget</title>
  <style>
    :root {
      --bg-color: #0b0c10;
      --card-bg: rgba(255, 255, 255, 0.04);
      --accent-color: #10B981; /* Premium Emerald Green */
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --border-color: rgba(255, 255, 255, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body, html {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent; /* Allows launcher transparency */
      overflow: hidden;
    }

    /* Fully fluid layout that scales perfectly to any widget size */
    .widget-container {
      width: 100%;
      height: 100%;
      padding: 16px;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .widget-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .live-pulse {
      width: 8px;
      height: 8px;
      background-color: var(--accent-color);
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 8px var(--accent-color);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    .refresh-btn {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s, transform 0.1s;
    }

    .refresh-btn:active {
      transform: scale(0.9);
      background: rgba(255, 255, 255, 0.12);
    }

    .widget-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex-grow: 1;
    }

    .rate-display {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .rate-value {
      font-size: clamp(2.2rem, 10vw, 3.4rem);
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -1.5px;
      line-height: 1;
    }

    .rate-currency {
      font-size: clamp(1rem, 4vw, 1.4rem);
      font-weight: 600;
      color: var(--accent-color);
    }

    .conversion-hint {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .widget-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.7rem;
      color: var(--text-secondary);
      border-top: 1px solid rgba(255, 255, 255, 0.06);
      padding-top: 8px;
    }

    .spin {
      animation: spin 0.6s ease-in-out;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="widget-container">
    <div class="widget-header">
      <div class="widget-title">
        <span class="live-pulse"></span>SAR ➔ INR
      </div>
      <button class="refresh-btn" id="refreshBtn" onclick="fetchRate()">↻</button>
    </div>

    <div class="widget-content">
      <div class="rate-display">
        <span class="rate-value" id="rate">--.--</span>
        <span class="rate-currency">INR</span>
      </div>
      <div class="conversion-hint">1 Saudi Riyal (SAR)</div>
    </div>

    <div class="widget-footer">
      <span id="lastUpdated">Last updated: Loading...</span>
      <span>Live Rate</span>
    </div>
  </div>

  <script>
    const API_URL = 'https://open.er-api.com/v6/latest/SAR';
    const rateEl = document.getElementById('rate');
    const timeEl = document.getElementById('lastUpdated');
    const refreshBtn = document.getElementById('refreshBtn');

    // Instantly pull from cache on startup so the widget never looks blank
    function loadCache() {
      const cachedRate = localStorage.getItem('sar_inr_rate');
      const cachedTime = localStorage.getItem('sar_inr_time');
      if (cachedRate) rateEl.textContent = parseFloat(cachedRate).toFixed(2);
      if (cachedTime) timeEl.textContent = `Last updated: ${cachedTime}`;
    }

    async function fetchRate() {
      refreshBtn.classList.add('spin');
      setTimeout(() => refreshBtn.classList.remove('spin'), 600);

      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error();
        
        const data = await response.json();
        const rate = data.rates.INR;
        
        if (rate) {
          const formatted = rate.toFixed(2);
          rateEl.textContent = formatted;
          
          const now = new Date();
          const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          timeEl.textContent = `Last updated: ${timeStr}`;

          localStorage.setItem('sar_inr_rate', formatted);
          localStorage.setItem('sar_inr_time', timeStr);
        }
      } catch (err) {
        console.error('Fetch failed:', err);
        if (!localStorage.getItem('sar_inr_rate')) {
          rateEl.textContent = 'Err';
          timeEl.textContent = 'Connection error';
        }
      }
    }

    loadCache();
    fetchRate();

    // Fallback page-level auto-refresh interval (15 minutes)
    setInterval(fetchRate, 15 * 60 * 1000);
  </script>
</body>
</html>
