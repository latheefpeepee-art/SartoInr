<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional Currency & Salah Widget</title>
  <style>
    :root {
      --bg-main: #0d0e11; /* Ultra-dark luxury slate */
      --panel-bg: rgba(255, 255, 255, 0.03);
      --border-color: rgba(255, 255, 255, 0.07);
      --text-main: #f3f4f6;
      --text-muted: #8a8f98;
      --accent-gold: #d4af37; /* Premium muted gold accent */
      --accent-blue: #3b82f6; /* System indicator blue */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body, html {
      width: 100%;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: transparent;
      overflow: hidden;
    }

    /* Executive Dashboard Grid Container */
    .dashboard-container {
      width: 100%;
      height: 100%;
      padding: 16px;
      background: var(--bg-main);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
    }

    /* Meta Header Row */
    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
    }

    .location-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--panel-bg);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border-color);
    }

    .location-dot {
      width: 6px;
      height: 6px;
      background: var(--accent-blue);
      border-radius: 50%;
    }

    .refresh-trigger {
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      transition: color 0.2s;
    }
    
    .refresh-trigger:active {
      color: var(--text-main);
    }

    /* Data Core Blocks */
    .dash-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-grow: 1;
      justify-content: center;
      margin: 10px 0;
    }

    /* Section A: Exchange Panel */
    .exchange-panel {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pairing-wrapper {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .flag-node {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .pair-lbl {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .rate-string {
      font-size: clamp(1.6rem, 7vw, 2.3rem);
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: -0.5px;
    }

    /* Section B: Salah Panel Grid */
    .salah-panel {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .salah-title {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--accent-gold);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding-left: 2px;
    }

    .salah-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }

    .prayer-slot {
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 8px 4px;
      text-align: center;
    }

    .prayer-slot.highlight {
      border-color: rgba(212, 175, 55, 0.3);
      background: rgba(212, 175, 55, 0.02);
    }

    .slot-name {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .slot-time {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-main);
      margin-top: 2px;
    }

    /* Universal Footer */
    .dash-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.65rem;
      color: var(--text-muted);
      border-top: 1px solid var(--border-color);
      padding-top: 8px;
    }

    .rotation-lock {
      animation: loopCycle 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes loopCycle { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="dashboard-container">
    <!-- Meta Header -->
    <div class="dash-header">
      <div class="location-badge">
        <span class="location-dot"></span>
        <span id="geoTarget">Locating...</span>
      </div>
      <button class="refresh-trigger" id="masterSync" onclick="refreshAllPipelines()">↻</button>
    </div>

    <!-- Main Stack -->
    <div class="dash-body">
      <!-- Forex Asset -->
      <div class="exchange-panel">
        <div class="pairing-wrapper">
          <img src="https://flagcdn.com/w80/sa.png" class="flag-node" alt="SA">
          <span class="pair-lbl">SAR/INR</span>
          <img src="https://flagcdn.com/w80/in.png" class="flag-node" alt="IN">
        </div>
        <div class="rate-string" id="forexOutput">--.----</div>
      </div>

      <!-- Prayer Asset -->
      <div class="salah-panel">
        <div class="salah-title">Salah Timings & Shuruq</div>
        <div class="salah-grid">
          <div class="prayer-slot"><div class="slot-name">Fajr</div><div class="slot-time" id="t-fajr">--:--</div></div>
          <div class="prayer-slot highlight"><div class="slot-name">Sunrise</div><div class="slot-time" id="t-sunrise">--:--</div></div>
          <div class="prayer-slot"><div class="slot-name">Dhuhr</div><div class="slot-time" id="t-dhuhr">--:--</div></div>
          <div class="prayer-slot"><div class="slot-name">Asr</div><div class="slot-time" id="t-asr">--:--</div></div>
          <div class="prayer-slot"><div class="slot-name">Maghrib</div><div class="slot-time" id="t-maghrib">--:--</div></div>
          <div class="prayer-slot"><div class="slot-name">Isha</div><div class="slot-time" id="t-isha">--:--</div></div>
        </div>
      </div>
    </div>

    <!-- Footer Meta -->
    <div class="dash-footer">
      <span id="syncMeta">Awaiting first sync...</span>
      <span>Live Matrix</span>
    </div>
  </div>

  <script>
    const FOREX_ENDPOINT = 'https://open.er-api.com/v6/latest/SAR';
    const PRAYER_ENDPOINT_BASE = 'https://api.aladhan.com/v1/timings';
    
    // Fallback safe reference coordinates (Riyadh, KSA)
    const DEFAULT_LAT = 24.7136;
    const DEFAULT_LNG = 46.6753;
    const DEFAULT_CITY = "Riyadh";

    function loadLocalStorageCache() {
      if(localStorage.getItem('prof_rate')) document.getElementById('forexOutput').textContent = localStorage.getItem('prof_rate');
      if(localStorage.getItem('prof_geo')) document.getElementById('geoTarget').textContent = localStorage.getItem('prof_geo');
      
      const targetSlots = ['fajr', 'sunrise', 'dhuhr', 'asr', 'maghrib', 'isha'];
      targetSlots.forEach(slot => {
        const val = localStorage.getItem(`prof_t_${slot}`);
        if(val) document.getElementById(`t-${slot}`).textContent = val;
      });
      if(localStorage.getItem('prof_sync')) document.getElementById('syncMeta').textContent = `Sync: ${localStorage.getItem('prof_sync')}`;
    }

    async function refreshAllPipelines() {
      const syncBtn = document.getElementById('masterSync');
      syncBtn.classList.add('rotation-lock');
      setTimeout(() => syncBtn.classList.remove('rotation-lock'), 700);

      await runForexPipeline();
      await runLocationAndPrayerPipeline();
    }

    async function runForexPipeline() {
      try {
        const response = await fetch(FOREX_ENDPOINT);
        if (!response.ok) throw new Error();
        const data = await response.json();
        const rawRate = data.rates.INR;
        if(rawRate) {
          const processedRate = rawRate.toFixed(4);
          document.getElementById('forexOutput').textContent = processedRate;
          localStorage.setItem('prof_rate', processedRate);
        }
      } catch(e) { console.error("Forex loop error", e); }
    }

    async function runLocationAndPrayerPipeline() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (position) => {
            executePrayerFetch(position.coords.latitude, position.coords.longitude, "Auto GPS");
          },
          () => { executeIPFallback(); },
          { timeout: 6000 }
        );
      } else {
        executeIPFallback();
      }
    }

    async function executeIPFallback() {
      try {
        const res = await fetch('https://ipapi.co/json/');
        if(!res.ok) throw new Error();
        const data = await res.json();
        if(data.latitude && data.longitude) {
          executePrayerFetch(data.latitude, data.longitude, data.city || "Auto IP");
        } else { throw new Error(); }
      } catch(e) {
        console.warn("Using baseline geographic coordinates.");
        executePrayerFetch(DEFAULT_LAT, DEFAULT_LNG, DEFAULT_CITY);
      }
    }

    async function executePrayerFetch(lat, lng, label) {
      try {
        const dateParam = new Date().toISOString().split('T')[0]; // Current local ISO format
        const response = await fetch(`${PRAYER_ENDPOINT_BASE}/${dateParam}?latitude=${lat}&longitude=${lng}`);
        if(!response.ok) throw new Error();
        
        const payload = await response.json();
        const timings = payload.data.timings;
        
        document.getElementById('geoTarget').textContent = label;
        localStorage.setItem('prof_geo', label);

        const mappings = {
          'fajr': timings.Fajr,
          'sunrise': timings.Sunrise,
          'dhuhr': timings.Dhuhr,
          'asr': timings.Asr,
          'maghrib': timings.Maghrib,
          'isha': timings.Isha
        };

        for (const [key, value] of Object.entries(mappings)) {
          if(value) {
            // Clean 24-hr layout parsing from API payload
            document.getElementById(`t-${key}`).textContent = value;
            localStorage.setItem(`prof_t_${key}`, value);
          }
        }

        const stamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        document.getElementById('syncMeta').textContent = `Sync: ${stamp}`;
        localStorage.setItem('prof_sync', stamp);

      } catch(e) { console.error("Prayer timing parsing system fault", e); }
    }

    // Initialize execution block
    loadLocalStorageCache();
    refreshAllPipelines();

    // Constant 30-minute widget background structural sweep
    setInterval(refreshAllPipelines, 30 * 60 * 1000);
  </script>
</body>
</html>
