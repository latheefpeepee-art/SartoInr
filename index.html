<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- HARDCORE AUTO-UPDATE: Forces the entire widget view container to reboot from network loops every 60s -->
  <meta http-equiv="refresh" content="60">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Max Density Forex & Salah Ticker</title>
  <style>
    :root {
      --bg-pure: #000000; /* Pure deep AMOLED black */
      --glass-panel: rgba(255, 255, 255, 0.03);
      --border-thin: rgba(255, 255, 255, 0.09);
      --neon-cyan: #00e5ff;
      --neon-magenta: #ff007f;
      --neon-gold: #f1c40f;
      --text-white: #ffffff;
      --text-gray: #a6adbb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body, html {
      width: 100%;
      height: 100vh;
      background: transparent;
      overflow: hidden;
    }

    /* Zero-margin design to lock pixels to the absolute edge of your S23 Ultra launcher screen */
    .widget-root {
      width: 100%;
      height: 100%;
      background: var(--bg-pure);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 0px; 
    }

    /* Top Core Stack: Left-Aligned Master Panel */
    .master-forex-strip {
      background: var(--glass-panel);
      border-bottom: 1px solid var(--border-thin);
      padding: 6px 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }

    .pair-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: clamp(0.75rem, 3.5vw, 1rem);
      font-weight: 900;
      color: var(--text-white);
    }

    .flag-ico {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #ffffff;
    }

    /* Clean rotatable refresh asset - completely unboxed */
    #spinIcon {
      color: var(--neon-cyan);
      font-size: 1.25rem;
      cursor: pointer;
      font-weight: bold;
    }

    /* Left-aligned massive rate display block */
    .rate-text {
      font-size: clamp(2.4rem, 12vw, 3.8rem);
      font-weight: 950;
      color: var(--neon-cyan);
      letter-spacing: -1.5px;
      line-height: 1;
      text-align: left; /* Strict left alignment */
      margin-top: 2px;
    }

    /* Live Countdown Block: Shifted to the left underneath the exchange value */
    .countdown-text {
      font-size: clamp(0.85rem, 4.2vw, 1.2rem);
      font-weight: 850;
      color: var(--neon-gold);
      text-transform: uppercase;
      text-align: left;
      margin-top: 2px;
      letter-spacing: 0.2px;
    }

    /* High-Density Vertical Single-Line List Rows */
    .salah-vertical-list {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      gap: 1px; /* Razor thin separator lines */
    }

    .salah-line-row {
      background: var(--glass-panel);
      border-top: 1px solid var(--border-thin);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 10px;
      flex-grow: 1; /* Automatically expands height area to remain massive */
    }

    .salah-name {
      font-size: clamp(1.1rem, 5.2vw, 1.75rem); /* Giant text scale */
      font-weight: 850;
      color: var(--text-gray);
      text-transform: uppercase;
    }

    .salah-time {
      font-size: clamp(1.25rem, 5.8vw, 1.95rem); /* Giant numerical scale */
      font-weight: 950;
      color: var(--text-white);
      letter-spacing: -0.5px;
    }

    .ampm-suffix {
      font-size: 0.55em;
      font-weight: 800;
      color: var(--text-gray);
      margin-left: 2px;
    }

    /* MAXIMUM ACTION HIGHLIGHT: High-contrast flashing row overlay for upcoming tracking point */
    .active-row-alert {
      background: linear-gradient(90deg, var(--neon-magenta) 0%, rgba(255, 0, 127, 0.15) 100%) !important;
      border-left: 5px solid var(--neon-magenta) !important;
    }

    .active-row-alert .salah-name {
      color: #ffffff !important;
    }

    .active-row-alert .salah-time {
      color: var(--neon-gold) !important;
      text-shadow: 0 0 8px rgba(241, 196, 15, 0.5);
    }
  </style>
</head>
<body>

  <div class="widget-root" onclick="forceManualRefresh()">
    <!-- Top Configuration Header & Left-Aligned Core Info -->
    <div class="master-forex-strip">
      <div class="meta-row">
        <div class="pair-badge">
          <img src="https://flagcdn.com/w80/sa.png" class="flag-ico" alt="SA">
          <img src="https://flagcdn.com/w80/in.png" class="flag-ico" alt="IN">
          <span>SAR / INR</span>
        </div>
        <span id="spinIcon">↻</span>
      </div>
      
      <!-- Left-Aligned Unmodified Giant Rates -->
      <div class="rate-text" id="rateBlock">--.----</div>
      
      <!-- Left-Aligned High Precision Live Ticker with Seconds Tracking -->
      <div class="countdown-text" id="secondsCountdown">NEXT: --:--:--</div>
    </div>

    <!-- Single-Line High-Density Stacked Layout -->
    <div class="salah-vertical-list">
      <div class="salah-line-row" id="row-fajr">
        <span class="salah-name">Fajr</span>
        <span class="salah-time" id="t-fajr">--:--</span>
      </div>
      <div class="salah-line-row" id="row-sunrise">
        <span class="salah-name">Sunrise</span>
        <span class="salah-time" id="t-sunrise">--:--</span>
      </div>
      <div class="salah-line-row" id="row-dhuhr">
        <span class="salah-name">Dhuhr</span>
        <span class="salah-time" id="t-dhuhr">--:--</span>
      </div>
      <div class="salah-line-row" id="row-asr">
        <span class="salah-name">Asr</span>
        <span class="salah-time" id="t-asr">--:--</span>
      </div>
      <div class="salah-line-row" id="row-maghrib">
        <span class="salah-name">Maghrib</span>
        <span class="salah-time" id="t-maghrib">--:--</span>
      </div>
      <div class="salah-line-row" id="row-isha">
        <span class="salah-name">Isha</span>
        <span class="salah-time" id="t-isha">--:--</span>
      </div>
    </div>
  </div>

  <script>
    // --- MANUAL SPREAD CALIBRATION OFFSET ---
    // Change this value to match whatever live price variation you prefer
    const CUSTOM_SPREAD_ALIGNMENT = 0.0600; 

    const URL_FOREX = 'https://open.er-api.com/v6/latest/SAR';
    const URL_SALAH = 'https://api.aladhan.com/v1/timings';

    const DEF_LAT = 24.7136;
    const DEF_LNG = 46.6753;

    let targetPrayerDate = null;
    let targetPrayerLabel = "";
    let localSalahCached = null;

    function formatTo12HourFormat(time24String) {
      if (!time24String) return '--:--';
      const clearRaw = time24String.split(' ')[0];
      let [h, m] = clearRaw.split(':').map(Number);
      const marker = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return `${h}:${m < 10 ? '0' + m : m}<span class="ampm-suffix">${marker}</span>`;
    }

    function recoverWidgetCache() {
      if (localStorage.getItem('mx_rate')) document.getElementById('rateBlock').textContent = localStorage.getItem('mx_rate');
      
      const identifiers = ['fajr', 'sunrise', 'dhuhr', 'asr', 'maghrib', 'isha'];
      let cacheBuilder = {};
      identifiers.forEach(id => {
        const value = localStorage.getItem(`mx_t_${id}`);
        if (value) {
          document.getElementById(`t-${id}`).innerHTML = formatTo12HourFormat(value);
          const apiKey = id.charAt(0).toUpperCase() + id.slice(1);
          cacheBuilder[apiKey] = value;
        }
      });
      
      if (Object.keys(cacheBuilder).length === 6) {
        localSalahCached = cacheBuilder;
        processNextSalahHighlight();
      }
    }

    function forceManualRefresh() {
      fetchExchangeRate();
      fetchSalahTimings();
    }

    async function fetchExchangeRate() {
      try {
        const response = await fetch(URL_FOREX);
        if (!response.ok) throw new Error();
        const data = await response.json();
        const basePrice = data.rates.INR;
        if (basePrice) {
          const finalComputedPrice = (basePrice + CUSTOM_SPREAD_ALIGNMENT).toFixed(4);
          document.getElementById('rateBlock').textContent = finalComputedPrice;
          localStorage.setItem('mx_rate', finalComputedPrice);
        }
      } catch (e) { console.error("FX Core sync exception", e); }
    }

    async function fetchSalahTimings() {
      const abortRouter = new AbortController();
      const timeoutFallbackId = setTimeout(() => abortRouter.abort(), 1500);

      try {
        const resIp = await fetch('https://ipapi.co/json/', { signal: abortRouter.signal });
        clearTimeout(timeoutFallbackId);
        if (!resIp.ok) throw new Error();
        const ipData = await resIp.json();
        if (ipData.latitude && ipData.longitude) {
          executeSalahNetworkCall(ipData.latitude, ipData.longitude);
        } else { throw new Error(); }
      } catch (err) {
        executeSalahNetworkCall(DEF_LAT, DEF_LNG);
      }
    }

    async function executeSalahNetworkCall(lat, lng) {
      try {
        const localISO = new Date().toISOString().split('T')[0];
        // Umm Al-Qura (Method 4) strictly pinned
        const response = await fetch(`${URL_SALAH}/${localISO}?latitude=${lat}&longitude=${lng}&method=4`);
        if (!response.ok) throw new Error();
        
        const payload = await response.json();
        const timings = payload.data.timings;
        localSalahCached = timings;

        const targetMap = {
          'fajr': timings.Fajr, 'sunrise': timings.Sunrise, 'dhuhr': timings.Dhuhr,
          'asr': timings.Asr, 'maghrib': timings.Maghrib, 'isha': timings.Isha
        };

        for (const [key, val] of Object.entries(targetMap)) {
          if (val) {
            document.getElementById(`t-${key}`).innerHTML = formatTo12HourFormat(val);
            localStorage.setItem(`mx_t_${key}`, val);
          }
        }
        processNextSalahHighlight();
      } catch (e) { console.error("Salah core sync exception", e); }
    }

    function processNextSalahHighlight() {
      if (!localSalahCached) return;

      const currentTime = new Date();
      const prayerLoopArray = [
        { name: 'fajr', time: localSalahCached.Fajr },
        { name: 'dhuhr', time: localSalahCached.Dhuhr },
        { name: 'asr', time: localSalahCached.Asr },
        { name: 'maghrib', time: localSalahCached.Maghrib },
        { name: 'isha', time: localSalahCached.Isha }
      ];

      const rows = ['fajr', 'sunrise', 'dhuhr', 'asr', 'maghrib', 'isha'];
      rows.forEach(r => {
        const element = document.getElementById(`row-${r}`);
        if (element) element.classList.remove('active-row-alert');
      });

      let isolatedNext = null;

      for (let p of prayerLoopArray) {
        if (!p.time) continue;
        const cleanRaw = p.time.split(' ')[0];
        const [hrs, mins] = cleanRaw.split(':').map(Number);
        const pInstance = new Date(currentTime);
        pInstance.setHours(hrs, mins, 0, 0);

        if (pInstance > currentTime) {
          isolatedNext = p;
          targetPrayerDate = pInstance;
          break;
        }
      }

      if (!isolatedNext) {
        isolatedNext = prayerLoopArray[0];
        const cleanRaw = isolatedNext.time.split(' ')[0];
        const [hrs, mins] = cleanRaw.split(':').map(Number);
        const tomorrowInstance = new Date(currentTime);
        tomorrowInstance.setDate(currentTime.getDate() + 1);
        tomorrowInstance.setHours(hrs, mins, 0, 0);
        targetPrayerDate = tomorrowInstance;
      }

      targetPrayerLabel = isolatedNext.name.toUpperCase();
      const targetRowNode = document.getElementById(`row-${isolatedNext.name}`);
      if (targetRowNode) targetRowNode.classList.add('active-row-alert');

      executeLiveSecondsTicker();
    }

    function executeLiveSecondsTicker() {
      if (!targetPrayerDate) return;

      const now = new Date();
      const varianceDelta = targetPrayerDate - now;

      if (varianceDelta <= 0) {
        processNextSalahHighlight();
        return;
      }

      const rawSeconds = Math.floor(varianceDelta / 1000);
      const displayHours = Math.floor(rawSeconds / 3600);
      const displayMinutes = Math.floor((rawSeconds % 3600) / 60);
      const displaySeconds = Math.floor(rawSeconds % 60);

      // Left-aligned absolute performance seconds layout string output
      document.getElementById('secondsCountdown').textContent = 
        `${targetPrayerLabel}: -${displayHours}h ${displayMinutes}m ${displaySeconds}s`;
    }

    // Immediate pipeline trigger on window loading states
    recoverWidgetCache();
    forceManualRefresh();

    // Secondary local safety loops to drive live graphics rendering smoothly
    setInterval(executeLiveSecondsTicker, 1000);
  </script>
</body>
</html>
