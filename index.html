<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMOLED Snake Flow Ticker</title>
  <style>
    :root {
      --bg-pure: #000000; /* Pure AMOLED Black */
      --glass-panel: rgba(255, 255, 255, 0.04);
      --border-thin: rgba(255, 255, 255, 0.09);
      --neon-cyan: #00e5ff;
      --neon-magenta: #ff007f;
      --neon-gold: #f1c40f;
      --text-white: #ffffff;
      --text-gray: #a6adbb;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body, html {
      width: 100%;
      height: 100vh;
      background: transparent;
      overflow: hidden;
    }

    /* Edge-to-edge container layout mapping */
    .widget-root {
      width: 100%;
      height: 100%;
      background: var(--bg-pure);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 0px; 
      position: relative;
    }

    /* Header Panel containing Left Countdown & Right Rate in the exact same size scale */
    .header-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 10px 12px 8px 12px;
      background: var(--glass-panel);
      position: relative;
    }

    .countdown-text, .rate-text {
      font-size: clamp(1.15rem, 5.4vw, 1.9rem); 
      font-weight: 950;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .countdown-text {
      color: var(--neon-gold);
      text-align: left;
      text-transform: uppercase;
    }

    .rate-text {
      color: var(--neon-cyan);
      text-align: right;
    }

    /* THE SNAKE FLOW LINE: Sits flush on the boundary edge. 
       Width updates via JS, background gradient loops continuously */
    .snake-progress-edge {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 3px;
      width: 100%;
      background: linear-gradient(90deg, var(--neon-magenta), var(--neon-cyan), var(--neon-gold), var(--neon-magenta));
      background-size: 300% 100%;
      box-shadow: 0 0 10px var(--neon-magenta), 0 0 4px var(--neon-cyan);
      animation: snakeSlither 3s linear infinite;
      transition: width 1s linear;
    }

    @keyframes snakeSlither {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    /* Horizontal Ribbon layout row spanning edge-to-edge across the base */
    .salah-horizontal-ribbon {
      display: flex;
      width: 100%;
      flex-grow: 1;
      gap: 1px; 
      margin-top: 1px;
    }

    /* Two-line column structural blocks */
    .salah-column-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--glass-panel);
      border: 1px solid var(--border-thin);
      padding: 4px 1px;
      text-align: center;
    }

    /* Line 1: Short Name Title */
    .salah-name-line {
      font-size: clamp(0.78rem, 3.5vw, 1.25rem);
      font-weight: 850;
      color: var(--text-gray);
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    /* Line 2: Salah Numeric Time */
    .salah-time-line {
      font-size: clamp(0.92rem, 4.4vw, 1.6rem);
      font-weight: 950;
      color: var(--text-white);
      line-height: 1;
    }

    .ampm-marker {
      font-size: 0.55em;
      font-weight: 800;
      color: var(--text-gray);
      display: block; 
      margin-top: 2px;
    }

    /* Dynamic hot pink column highlight block for active tracking target */
    .active-column-highlight {
      background: linear-gradient(180deg, var(--neon-magenta) 0%, rgba(255, 0, 127, 0.05) 100%) !important;
      border: 1.5px solid var(--neon-magenta) !important;
    }

    .active-column-highlight .salah-name-line {
      color: #ffffff !important;
    }

    .active-column-highlight .salah-time-line {
      color: var(--neon-gold) !important;
      text-shadow: 0 0 6px rgba(241, 196, 15, 0.4);
    }

    .active-column-highlight .ampm-marker {
      color: #ffffff !important;
    }
  </style>
</head>
<body>

  <div class="widget-root" onclick="forceSilentRefresh()">
    <!-- Header Panel with Integrated Floating Progress Edge Track -->
    <div class="header-panel">
      <div class="countdown-text" id="liveTickerOutput">NEXT: --:--:--</div>
      <div class="rate-text" id="rateBlock">--.---- SAR</div>
      <!-- Animated flowing tracking node line -->
      <div class="snake-progress-edge" id="snakeTrack"></div>
    </div>

    <!-- Horizontal Ribbon Grid Matrix -->
    <div class="salah-horizontal-ribbon">
      <div class="salah-column-card" id="card-fajr">
        <span class="salah-name-line">Fajr</span>
        <span class="salah-time-line" id="t-fajr">--:--</span>
      </div>
      <div class="salah-column-card" id="card-sunrise">
        <span class="salah-name-line">Sunrise</span>
        <span class="salah-time-line" id="t-sunrise">--:--</span>
      </div>
      <div class="salah-column-card" id="card-dhuhr">
        <span class="salah-name-line">Dhuhr</span>
        <span class="salah-time-line" id="t-dhuhr">--:--</span>
      </div>
      <div class="salah-column-card" id="card-asr">
        <span class="salah-name-line">Asr</span>
        <span class="salah-time-line" id="t-asr">--:--</span>
      </div>
      <div class="salah-column-card" id="card-maghrib">
        <span class="salah-name-line">Maghrib</span>
        <span class="salah-time-line" id="t-maghrib">--:--</span>
      </div>
      <div class="salah-column-card" id="card-isha">
        <span class="salah-name-line">Isha</span>
        <span class="salah-time-line" id="t-isha">--:--</span>
      </div>
    </div>
  </div>

  <script>
    const FX_URL = 'https://open.er-api.com/v6/latest/SAR';
    const PRAYER_URL_BASE = 'https://api.aladhan.com/v1/timings';
    const LAT_RIYADH = 24.7136;
    const LNG_RIYADH = 46.6753;

    let countdownTargetTime = null;
    let countdownStartTime = null;
    let countdownTargetLabel = "";
    let localTimingsCache = null;

    function formatTo12HourStr(time24) {
      if (!time24) return '--:--';
      const cleanRaw = time24.split(' ')[0];
      let [h, m] = cleanRaw.split(':').map(Number);
      const suffix = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return `${h}:${m < 10 ? '0' + m : m}<span class="ampm-marker">${suffix}</span>`;
    }

    function readWidgetLocalStorage() {
      if (localStorage.getItem('hz_rate')) {
        document.getElementById('rateBlock').textContent = localStorage.getItem('hz_rate') + " SAR";
      }
      
      const lines = ['fajr', 'sunrise', 'dhuhr', 'asr', 'maghrib', 'isha'];
      let cacheReconstructor = {};
      lines.forEach(id => {
        const value = localStorage.getItem(`hz_t_${id}`);
        if (value) {
          document.getElementById(`t-${id}`).innerHTML = formatTo12HourStr(value);
          const apiKey = id.charAt(0).toUpperCase() + id.slice(1);
          cacheReconstructor[apiKey] = value;
        }
      });
      
      if (Object.keys(cacheReconstructor).length === 6) {
        localTimingsCache = cacheReconstructor;
        evaluateActivePrayerHighlight();
      }
    }

    function forceSilentRefresh() {
      fetchLiveRate();
      lookupIPCoordinates();
    }

    async function fetchLiveRate() {
      try {
        const response = await fetch(FX_URL);
        if (!response.ok) throw new Error();
        const data = await response.json();
        const rawInterbankRate = data.rates.INR;
        if (rawInterbankRate) {
          // Zero modifications or artificial offsets applied to match financial benchmarks
          const precisionRateString = rawInterbankRate.toFixed(4);
          document.getElementById('rateBlock').textContent = precisionRateString + " SAR";
          localStorage.setItem('hz_rate', precisionRateString);
        }
      } catch (err) { console.error("Forex update background pipeline down", err); }
    }

    async function lookupIPCoordinates() {
      const abortNode = new AbortController();
      const fallbackTimer = setTimeout(() => abortNode.abort(), 1500);

      try {
        const response = await fetch('https://ipapi.co/json/', { signal: abortNode.signal });
        clearTimeout(fallbackTimer);
        if (!response.ok) throw new Error();
        const data = await response.json();
        if (data.latitude && data.longitude) {
          executeSalahFetchCall(data.latitude, data.longitude);
        } else { throw new Error(); }
      } catch (e) {
        executeSalahFetchCall(LAT_RIYADH, LNG_RIYADH);
      }
    }

    async function executeSalahFetchCall(lat, lng) {
      try {
        const currentISOString = new Date().toISOString().split('T')[0];
        const response = await fetch(`${PRAYER_URL_BASE}/${currentISOString}?latitude=${lat}&longitude=${lng}&method=4`);
        if (!response.ok) throw new Error();
        
        const payload = await response.json();
        const timings = payload.data.timings;
        localTimingsCache = timings;

        const syncMatrix = {
          'fajr': timings.Fajr, 'sunrise': timings.Sunrise, 'dhuhr': timings.Dhuhr,
          'asr': timings.Asr, 'maghrib': timings.Maghrib, 'isha': timings.Isha
        };

        for (const [key, val] of Object.entries(syncMatrix)) {
          if (val) {
            document.getElementById(`t-${key}`).innerHTML = formatTo12HourStr(val);
            localStorage.setItem(`hz_t_${key}`, val);
          }
        }
        evaluateActivePrayerHighlight();
      } catch (err) { console.error("Salah fetch call pipeline down", err); }
    }

    function parseTimeToDate(timeStr, referenceDate = new Date()) {
      const cleanStr = timeStr.split(' ')[0];
      const [hours, minutes] = cleanStr.split(':').map(Number);
      const targetDate = new Date(referenceDate);
      targetDate.setHours(hours, minutes, 0, 0);
      return targetDate;
    }

    function evaluateActivePrayerHighlight() {
      if (!localTimingsCache) return;

      const timeNow = new Date();
      
      // Order of calculation vectors across standard check boundaries
      const prayersList = [
        { key: 'fajr', time: localTimingsCache.Fajr },
        { key: 'dhuhr', time: localTimingsCache.Dhuhr },
        { key: 'asr', time: localTimingsCache.Asr },
        { key: 'maghrib', time: localTimingsCache.Maghrib },
        { key: 'isha', time: localTimingsCache.Isha }
      ];

      const cards = ['fajr', 'sunrise', 'dhuhr', 'asr', 'maghrib', 'isha'];
      cards.forEach(c => {
        const node = document.getElementById(`card-${c}`);
        if (node) node.classList.remove('active-column-highlight');
      });

      let nextSalah = null;
      let lastSalah = null;

      // Find upcoming target node
      for (let i = 0; i < prayersList.length; i++) {
        const pDate = parseTimeToDate(prayersList[i].time, timeNow);
        if (pDate > timeNow) {
          nextSalah = prayersList[i];
          countdownTargetTime = pDate;
          
          // Identify previous marker context to feed clean edge scaling lines
          if (i > 0) {
            lastSalah = prayersList[i - 1];
            countdownStartTime = parseTimeToDate(lastSalah.time, timeNow);
          } else {
            // Last prayer was yesterday's Isha
            lastSalah = prayersList[prayersList.length - 1];
            const yesterday = new Date(timeNow);
            yesterday.setDate(timeNow.getDate() - 1);
            countdownStartTime = parseTimeToDate(lastSalah.time, yesterday);
          }
          break;
        }
      }

      // Rollover check vectors wrapping to tomorrow morning
      if (!nextSalah) {
        nextSalah = prayersList[0];
        const tomorrow = new Date(timeNow);
        tomorrow.setDate(timeNow.getDate() + 1);
        countdownTargetTime = parseTimeToDate(nextSalah.time, tomorrow);
        
        lastSalah = prayersList[prayersList.length - 1];
        countdownStartTime = parseTimeToDate(lastSalah.time, timeNow);
      }

      countdownTargetLabel = nextSalah.key.toUpperCase();
      const targetCardElement = document.getElementById(`card-${nextSalah.key}`);
      if (targetCardElement) targetCardElement.add('active-column-highlight');

      runLiveCountdownEngine();
    }

    function runLiveCountdownEngine() {
      if (!countdownTargetTime || !countdownStartTime) return;

      const now = new Date();
      const timeRemainingMs = countdownTargetTime - now;

      if (timeRemainingMs <= 0) {
        evaluateActivePrayerHighlight();
        return;
      }

      // 1-Second Precise Countdown Render Chain
      const totalSeconds = Math.floor(timeRemainingMs / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = Math.floor(totalSeconds % 60);

      document.getElementById('liveTickerOutput').textContent = 
        `${countdownTargetLabel}: -${hours}h ${minutes}m ${seconds}s`;

      // DYNAMIC EDGE SNAKE SCALING: Maps the remaining time left relative to the full interval window
      const totalWindowDuration = countdownTargetTime - countdownStartTime;
      const progressPercent = (timeRemainingMs / totalWindowDuration) * 100;
      
      // Strict constraint guard protecting layout overflows
      const clampedPercentage = Math.max(0, Math.min(100, progressPercent));
      document.getElementById('snakeTrack').style.width = `${clampedPercentage}%`;
    }

    // Unlocking visibility event adapter forcing synchronization cycles instantly on awake
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") {
        forceSilentRefresh();
      }
    });

    // Run Initialization Block
    readWidgetLocalStorage();
    forceSilentRefresh();

    // Loop Interval driving the seconds display cleanly in the viewport stack
    setInterval(runLiveCountdownEngine, 1000);
  </script>
</body>
</html>
