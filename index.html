<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silent Smooth Ticker</title>
  <style>
    :root {
      --bg-pure: #000000; /* Pure AMOLED Black */
      --glass-panel: rgba(255, 255, 255, 0.03);
      --border-thin: rgba(255, 255, 255, 0.08);
      --neon-cyan: #00e5ff;
      --neon-magenta: #ff007f;
      --neon-gold: #f1c40f;
      --text-white: #ffffff;
      --text-gray: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body, html {
      width: 100%;
      height: 100vh;
      background: transparent;
      overflow: hidden;
    }

    .widget-root {
      width: 100%;
      height: 100%;
      background: var(--bg-pure);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2px;
    }

    /* Header: Countdown and Rate locked to the EXACT same typography size scale */
    .header-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 6px 8px;
      border-bottom: 1px solid var(--border-thin);
      background: var(--glass-panel);
    }

    .countdown-text, .rate-text {
      font-size: clamp(1.05rem, 4.6vw, 1.65rem); 
      font-weight: 950;
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    .countdown-text {
      color: var(--neon-gold);
      text-align: left;
      text-transform: uppercase;
    }

    .rate-text {
      color: var(--neon-cyan);
      text-align: right;
    }

    /* Horizontal Grid Row Layout */
    .salah-horizontal-ribbon {
      display: flex;
      width: 100%;
      flex-grow: 1;
      gap: 2px;
      margin-top: 2px;
    }

    /* Two-line column stacked grid blocks */
    .salah-column-card {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: var(--glass-panel);
      border: 1px solid var(--border-thin);
      border-radius: 10px;
      padding: 4px 1px;
      text-align: center;
    }

    /* Line 1: Short Name */
    .salah-name-line {
      font-size: clamp(0.72rem, 3.2vw, 1.1rem);
      font-weight: 850;
      color: var(--text-gray);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    /* Line 2: Numeric Time */
    .salah-time-line {
      font-size: clamp(0.88rem, 4vw, 1.4rem);
      font-weight: 950;
      color: var(--text-white);
      line-height: 1;
    }

    .ampm-marker {
      font-size: 0.58em;
      font-weight: 800;
      color: var(--text-gray);
      display: block; 
      margin-top: 2px;
    }

    /* Next active prayer dynamic highlight row alert card */
    .active-column-highlight {
      background: linear-gradient(180deg, var(--neon-magenta) 0%, rgba(255, 0, 127, 0.08) 100%) !important;
      border: 1.5px solid var(--neon-magenta) !important;
    }

    .active-column-highlight .salah-name-line {
      color: #ffffff !important;
    }

    .active-column-highlight .salah-time-line {
      color: var(--neon-gold) !important;
      text-shadow: 0 0 6px rgba(241, 196, 15, 0.4);
    }

    .active-column-highlight .ampm-marker {
      color: #ffffff !important;
    }
  </style>
</head>
<body>

  <!-- Tapping anywhere triggers a smooth silent manual refresh loop -->
  <div class="widget-root" onclick="silentBackgroundRefresh()">
    <div class="header-panel">
      <div class="countdown-text" id="liveTickerOutput">NEXT: --:--:--</div>
      <div class="rate-text" id="rateBlock">--.---- SAR/INR</div>
    </div>

    <div class="salah-horizontal-ribbon">
      <div class="salah-column-card" id="card-fajr">
        <span class="salah-name-line">Fajr</span>
        <span class="salah-time-line" id="t-fajr">--:--</span>
      </div>
      <div class="salah-column-card" id="card-sunrise">
        <span class="salah-name-line">Sunrise</span>
        <span class="salah-time-line" id="t-sunrise">--:--</span>
      </div>
      <div class="salah-column-card" id="card-dhuhr">
        <span class="salah-name-line">Dhuhr</span>
        <span class="salah-time-line" id="t-dhuhr">--:--</span>
      </div>
      <div class="salah-column-card" id="card-asr">
        <span class="salah-name-line">Asr</span>
        <span class="salah-time-line" id="t-asr">--:--</span>
      </div>
      <div class="salah-column-card" id="card-maghrib">
        <span class="salah-name-line">Maghrib</span>
        <span class="salah-time-line" id="t-maghrib">--:--</span>
      </div>
      <div class="salah-column-card" id="card-isha">
        <span class="salah-name-line">Isha</span>
        <span class="salah-time-line" id="t-isha">--:--</span>
      </div>
    </div>
  </div>

  <script>
    // Adjust this optional decimal if you want to align variations with retail tickers
    const SPREAD_CALIBRATION_VALUE = 0.0600; 

    const API_EXCHANGE = 'https://open.er-api.com/v6/latest/SAR';
    const API_SALAH = 'https://api.aladhan.com/v1/timings';
    const FALLBACK_LAT = 24.7136;
    const FALLBACK_LNG = 46.6753;

    let countdownTimeTarget = null;
    let countdownLabelTarget = "";
    let localMemoryTimings = null;

    function formatTo12Hour(time24) {
      if (!time24) return '--:--';
      const cleanRaw = time24.split(' ')[0];
      let [h, m] = cleanRaw.split(':').map(Number);
      const standardSuffix = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return `${h}:${m < 10 ? '0' + m : m}<span class="ampm-marker">${standardSuffix}</span>`;
    }

    function readStorageCache() {
      if (localStorage.getItem('hz_rate')) {
        document.getElementById('rateBlock').textContent = localStorage.getItem('hz_rate') + " SAR/INR";
      }
      
      const IDs = ['fajr', 'sunrise', 'dhuhr', 'asr', 'maghrib', 'isha'];
      let cacheRebuilder = {};
      IDs.forEach(id => {
        const val = localStorage.getItem(`hz_t_${id}`);
        if (val) {
          document.getElementById(`t-${id}`).innerHTML = formatTo12Hour(val);
          const upperKey = id.charAt(0).toUpperCase() + id.slice(1);
          cacheRebuilder[upperKey] = val;
        }
      });
      
      if (Object.keys(cacheRebuilder).length === 6) {
        localMemoryTimings = cacheRebuilder;
        recalculateActiveHighlight();
      }
    }

    function silentBackgroundRefresh() {
      fetchExchangeDataSilent();
      lookupLocationByIP();
    }

    async function fetchExchangeDataSilent() {
      try {
        const response = await fetch(API_EXCHANGE);
        if (!response.ok) throw new Error();
        const data = await response.json();
        const basePrice = data.rates.INR;
        if (basePrice) {
          const processedRate = (basePrice + SPREAD_CALIBRATION_VALUE).toFixed(4);
          document.getElementById('rateBlock').textContent = processedRate + " SAR/INR";
          localStorage.setItem('hz_rate', processedRate);
        }
      } catch (err) { console.error("Forex update background failed", err); }
    }

    async function lookupLocationByIP() {
      const routerController = new AbortController();
      const networkTimeout = setTimeout(() => routerController.abort(), 1500);

      try {
        const resIp = await fetch('https://ipapi.co/json/', { signal: routerController.signal });
        clearTimeout(networkTimeout);
        if (!resIp.ok) throw new Error();
        const ipData = await resIp.json();
        if (ipData.latitude && ipData.longitude) {
          executeSalahPipelineCall(ipData.latitude, ipData.longitude);
        } else { throw new Error(); }
      } catch (e) {
        executeSalahPipelineCall(FALLBACK_LAT, FALLBACK_LNG);
      }
    }

    async function executeSalahPipelineCall(lat, lng) {
      try {
        const dateISO = new Date().toISOString().split('T')[0];
        const response = await fetch(`${API_SALAH}/${dateISO}?latitude=${lat}&longitude=${lng}&method=4`);
        if (!response.ok) throw new Error();
        
        const packageData = await response.json();
        const timings = packageData.data.timings;
        localMemoryTimings = timings;

        const syncMatrix = {
          'fajr': timings.Fajr, 'sunrise': timings.Sunrise, 'dhuhr': timings.Dhuhr,
          'asr': timings.Asr, 'maghrib': timings.Maghrib, 'isha': timings.Isha
        };

        for (const [key, val] of Object.entries(syncMatrix)) {
          if (val) {
            document.getElementById(`t-${key}`).innerHTML = formatTo12Hour(val);
            localStorage.setItem(`hz_t_${key}`, val);
          }
        }
        recalculateActiveHighlight();
      } catch (err) { console.error("Salah background fetch failed", err); }
    }

    function recalculateActiveHighlight() {
      if (!localMemoryTimings) return;

      const rightNow = new Date();
      const prayerTimelineEvaluator = [
        { key: 'fajr', time: localMemoryTimings.Fajr },
        { key: 'dhuhr', time: localMemoryTimings.Dhuhr },
        { key: 'asr', time: localMemoryTimings.Asr },
        { key: 'maghrib', time: localMemoryTimings.Maghrib },
        { key: 'isha', time: localMemoryTimings.Isha }
      ];

      const cards = ['fajr', 'sunrise', 'dhuhr', 'asr', 'maghrib', 'isha'];
      cards.forEach(c => {
        const node = document.getElementById(`card-${c}`);
        if (node) node.classList.remove('active-column-highlight');
      });

      let nextSalahNode = null;

      for (let item of prayerTimelineEvaluator) {
        if (!item.time) continue;
        const pureTimeStr = item.time.split(' ')[0];
        const [hours, minutes] = pureTimeStr.split(':').map(Number);
        const loopInstanceDate = new Date(rightNow);
        loopInstanceDate.setHours(hours, minutes, 0, 0);

        if (loopInstanceDate > rightNow) {
          nextSalahNode = item;
          countdownTimeTarget = loopInstanceDate;
          break;
        }
      }

      if (!nextSalahNode) {
        nextSalahNode = prayerTimelineEvaluator[0];
        const pureTimeStr = nextSalahNode.time.split(' ')[0];
        const [hours, minutes] = pureTimeStr.split(':').map(Number);
        const tomorrowRolloverDate = new Date(rightNow);
        tomorrowRolloverDate.setDate(rightNow.getDate() + 1);
        tomorrowRolloverDate.setHours(hours, minutes, 0, 0);
        countdownTimeTarget = tomorrowRolloverDate;
      }

      countdownLabelTarget = nextSalahNode.key.toUpperCase();
      const targetCardElement = document.getElementById(`card-${nextSalahNode.key}`);
      if (targetCardElement) targetCardElement.classList.add('active-column-highlight');

      runLiveCountdownEngine();
    }

    function runLiveCountdownEngine() {
      if (!countdownTimeTarget) return;

      const now = new Date();
      const timeRemainingMs = countdownTimeTarget - now;

      if (timeRemainingMs <= 0) {
        recalculateActiveHighlight();
        return;
      }

      const totalSeconds = Math.floor(timeRemainingMs / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = Math.floor(totalSeconds % 60);

      document.getElementById('liveTickerOutput').textContent = 
        `${countdownLabelTarget}: -${hours}h ${minutes}m ${seconds}s`;
    }

    // Load instantly from data cache
    readStorageCache();
    silentBackgroundRefresh();

    // Timers handle data changes silently without refreshing the window frame
    setInterval(runLiveCountdownEngine, 1000);       // Live 1-second countdown ticker
    setInterval(silentBackgroundRefresh, 5 * 60 * 1000); // Silent background API data check every 5 minutes
  </script>
</body>
</html>
