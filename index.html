<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMOLED Edge-to-Edge Live Tracker</title>
  <style>
    :root {
      --bg-main: #000000; /* Pure AMOLED Black */
      --border-color: rgba(255, 255, 255, 0.08);
      --glass-panel: rgba(255, 255, 255, 0.03);
      --neon-cyan: #00e5ff;
      --neon-magenta: #ff007f;
      --neon-yellow: #f1c40f;
      --text-white: #ffffff;
      --text-gray: #8e94a0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body, html {
      width: 100%;
      height: 100vh;
      background: transparent;
      overflow: hidden;
    }

    /* 100% boundary usage, absolute edge-to-edge styling */
    .widget-container {
      width: 100%;
      height: 100%;
      background: var(--bg-main);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 1px; /* Minimal container safe margin */
    }

    /* Compact metadata row with zero gray background */
    .widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 6px;
      border-bottom: 1px solid var(--border-color);
      font-size: clamp(0.7rem, 3.2vw, 0.95rem);
      font-weight: 750;
    }

    .meta-geo {
      color: var(--neon-cyan);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .meta-countdown {
      color: var(--neon-yellow);
      font-weight: 850;
    }

    .meta-sync-zone {
      color: var(--text-gray);
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    /* Flat rotate icon - no gray box, just a clean spin symbol next to time */
    #spinIcon {
      display: inline-block;
      color: var(--neon-cyan);
      font-size: 1.15rem;
      line-height: 1;
      font-weight: bold;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .spinning {
      animation: spinLoop 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes spinLoop {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Compact Exchange Rate Row */
    .forex-row {
      background: var(--glass-panel);
      border: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 8px;
      margin: 1px 0;
      height: 10%; /* Reduced height to allocate maximum room to Salah */
    }

    .pair-badge {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .flag-ico {
      width: clamp(18px, 4.5vw, 22px);
      height: clamp(18px, 4.5vw, 22px);
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid #ffffff;
    }

    .pair-name {
      font-size: clamp(0.75rem, 3.5vw, 1rem);
      font-weight: 900;
      color: var(--text-white);
    }

    /* Streamlined currency typography */
    .rate-text {
      font-size: clamp(1.4rem, 7.5vw, 2.1rem);
      font-weight: 950;
      color: var(--neon-cyan);
      letter-spacing: -0.5px;
    }

    /* Salah Grid - maximized vertically and horizontally */
    .salah-matrix {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 1px; /* Minimal line split */
      flex-grow: 1;
    }

    .salah-block {
      background: var(--glass-panel);
      border: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0px; /* Zero padding to squeeze text elements directly to the edge */
    }

    /* Squeezed, highly visible typography */
    .block-name {
      font-size: clamp(0.9rem, 4.2vw, 1.4rem); 
      font-weight: 850;
      color: var(--text-gray);
      text-transform: uppercase;
    }

    .block-time {
      font-size: clamp(1.25rem, 6.2vw, 2.0rem); 
      font-weight: 950;
      color: var(--text-white);
      margin-top: 1px;
    }

    .time-suffix {
      font-size: 0.52em;
      font-weight: 750;
      opacity: 0.85;
      margin-left: 1px;
    }

    /* Dynamic highlighted panel */
    .highlighted-active {
      background: linear-gradient(135deg, var(--neon-magenta) 0%, #4f46e5 100%) !important;
      border: 1.5px solid var(--neon-magenta) !important;
      box-shadow: inset 0 0 10px rgba(255, 0, 127, 0.3);
    }

    .highlighted-active .block-name {
      color: #ffffff !important;
    }

    .highlighted-active .block-time {
      color: var(--neon-yellow) !important;
      text-shadow: 0 0 6px rgba(241, 196, 15, 0.4);
    }
  </style>
</head>
<body>

  <div class="widget-container">
    <!-- Header -->
    <div class="widget-header">
      <span class="meta-geo" id="geoMarker">Detecting...</span>
      <span class="meta-countdown" id="countdownBlock">Next: --:--</span>
      <div class="meta-sync-zone" onclick="manualSyncPipelines()">
        <span id="syncTimestamp">--:-- --</span>
        <span id="spinIcon">↻</span>
      </div>
    </div>

    <!-- Forex -->
    <div class="forex-row">
      <div class="pair-badge">
        <img src="https://flagcdn.com/w80/sa.png" class="flag-ico" alt="SA">
        <img src="https://flagcdn.com/w80/in.png" class="flag-ico" alt="IN">
        <span class="pair-name">SAR/INR</span>
      </div>
      <div class="rate-text" id="rateBlock">--.----</div>
    </div>

    <!-- Salah Grid -->
    <div class="salah-matrix">
      <div class="salah-block" id="box-fajr">
        <span class="block-name">Fajr</span>
        <span class="block-time" id="v-fajr">--:--</span>
      </div>
      <div class="salah-block" id="box-sunrise">
        <span class="block-name">Sunrise</span>
        <span class="block-time" id="v-sunrise">--:--</span>
      </div>
      <div class="salah-block" id="box-dhuhr">
        <span class="block-name">Dhuhr</span>
        <span class="block-time" id="v-dhuhr">--:--</span>
      </div>
      <div class="salah-block" id="box-asr">
        <span class="block-name">Asr</span>
        <span class="block-time" id="v-asr">--:--</span>
      </div>
      <div class="salah-block" id="box-maghrib">
        <span class="block-name">Maghrib</span>
        <span class="block-time" id="v-maghrib">--:--</span>
      </div>
      <div class="salah-block" id="box-isha">
        <span class="block-name">Isha</span>
        <span class="block-time" id="v-isha">--:--</span>
      </div>
    </div>
  </div>

  <script>
    // --- MANUAL RATE OFFSET CALIBRATION ---
    // Free APIs fetch standard wholesale interbank rates, while premium retail aggregators 
    // like XE overlay dynamic spreads. If your local tick has a micro-variance, 
    // adjust this decimal to calibrate your screen instantly!
    const RATE_OFFSET = 0.0600; 

    const FOREX_ENDPOINT = 'https://open.er-api.com/v6/latest/SAR';
    const SALAH_ENDPOINT_BASE = 'https://api.aladhan.com/v1/timings';

    const DEFAULT_LAT = 24.7136;
    const DEFAULT_LNG = 46.6753;
    const DEFAULT_CITY = "Riyadh";

    let cachedTimings = null;
    let targetNextPrayerTime = null;
    let targetNextPrayerName = "";

    // Parse and convert 24h format safely, removing any time zone suffixes
    function convertTo12HourFormat(time24) {
      if (!time24) return '--:--';
      const cleanTime = time24.split(' ')[0];
      let [hours, minutes] = cleanTime.split(':').map(Number);
      if (isNaN(hours) || isNaN(minutes)) return '--:--';
      
      const suffix = hours >= 12 ? 'PM' : 'AM';
      hours = hours % 12 || 12;
      return `${hours}:${minutes < 10 ? '0' + minutes : minutes}<span class="time-suffix">${suffix}</span>`;
    }

    function initFromLocalStorage() {
      if (localStorage.getItem('fin_rate')) {
        document.getElementById('rateBlock').textContent = localStorage.getItem('fin_rate');
      }
      if (localStorage.getItem('fin_geo')) {
        document.getElementById('geoMarker').textContent = localStorage.getItem('fin_geo');
      }
      if (localStorage.getItem('fin_sync')) {
        document.getElementById('syncTimestamp').textContent = localStorage.getItem('fin_sync');
      }
      
      const prayers = ['fajr', 'sunrise', 'dhuhr', 'asr', 'maghrib', 'isha'];
      let reconstructionObj = {};
      prayers.forEach(p => {
        const value = localStorage.getItem(`fin_time_${p}`);
        if (value) {
          document.getElementById(`v-${p}`).innerHTML = convertTo12HourFormat(value);
          const apiKey = p.charAt(0).toUpperCase() + p.slice(1);
          reconstructionObj[apiKey] = value;
        }
      });
      
      if (Object.keys(reconstructionObj).length === 6) {
        cachedTimings = reconstructionObj;
        evaluateNextPrayerAndHighlight();
      }
    }

    // Runs updates completely asynchronously so a delay in one doesn't block the other
    function manualSyncPipelines() {
      const icon = document.getElementById('spinIcon');
      icon.classList.add('spinning');
      setTimeout(() => { icon.classList.remove('spinning'); }, 600);

      fetchForexData();
      fetchSalahDataByIP();
    }

    async function fetchForexData() {
      try {
        const response = await fetch(FOREX_ENDPOINT);
        if (!response.ok) throw new Error();
        const data = await response.json();
        const baseRate = data.rates.INR;
        if (baseRate) {
          const correctedRate = (baseRate + RATE_OFFSET).toFixed(4);
          document.getElementById('rateBlock').textContent = correctedRate;
          localStorage.setItem('fin_rate', correctedRate);
        }
      } catch (e) { console.error("Forex Sync Error", e); }
    }

    async function fetchSalahDataByIP() {
      // 1.5-second hard safety timeout to completely bypass geolocation hanging
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 1500);

      try {
        const response = await fetch('https://ipapi.co/json/', { signal: controller.signal });
        clearTimeout(timeoutId);
        
        if (!response.ok) throw new Error();
        const data = await response.json();
        
        if (data.latitude && data.longitude) {
          downloadSalahTimings(data.latitude, data.longitude, data.city || "Auto IP");
        } else {
          throw new Error();
        }
      } catch (err) {
        console.warn("IP Geo timed out. Defaulting to Riyadh.");
        downloadSalahTimings(DEFAULT_LAT, DEFAULT_LNG, DEFAULT_CITY);
      }
    }

    async function downloadSalahTimings(lat, lng, label) {
      try {
        const dynamicISO = new Date().toISOString().split('T')[0];
        // Umm Al-Qura calculation method (4) locked natively
        const response = await fetch(`${SALAH_ENDPOINT_BASE}/${dynamicISO}?latitude=${lat}&longitude=${lng}&method=4`);
        if (!response.ok) throw new Error();
        
        const payload = await response.json();
        const timings = payload.data.timings;
        
        document.getElementById('geoMarker').textContent = label;
        localStorage.setItem('fin_geo', label);

        cachedTimings = timings;

        const mapping = {
          'fajr': timings.Fajr,
          'sunrise': timings.Sunrise,
          'dhuhr': timings.Dhuhr,
          'asr': timings.Asr,
          'maghrib': timings.Maghrib,
          'isha': timings.Isha
        };

        for (const [key, value] of Object.entries(mapping)) {
          if (value) {
            document.getElementById(`v-${key}`).innerHTML = convertTo12HourFormat(value);
            localStorage.setItem(`fin_time_${key}`, value);
          }
        }

        evaluateNextPrayerAndHighlight();

        const cleanNow = new Date();
        const formattedStamp = cleanNow.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: true });
        document.getElementById('syncTimestamp').textContent = formattedStamp;
        localStorage.setItem('fin_sync', formattedStamp);

      } catch (e) { console.error("Salah Sync Error", e); }
    }

    function evaluateNextPrayerAndHighlight() {
      if (!cachedTimings) return;

      const now = new Date();
      const timeline = [
        { id: 'fajr', time: cachedTimings.Fajr },
        { id: 'dhuhr', time: cachedTimings.Dhuhr },
        { id: 'asr', time: cachedTimings.Asr },
        { id: 'maghrib', time: cachedTimings.Maghrib },
        { id: 'isha', time: cachedTimings.Isha }
      ];

      const elements = ['fajr', 'sunrise', 'dhuhr', 'asr', 'maghrib', 'isha'];
      elements.forEach(id => {
        const el = document.getElementById(`box-${id}`);
        if (el) el.classList.remove('highlighted-active');
      });

      let nextFound = null;

      for (let item of timeline) {
        if (!item.time) continue;
        const cleanTime = item.time.split(' ')[0];
        const [h, m] = cleanTime.split(':').map(Number);
        const pDate = new Date(now);
        pDate.setHours(h, m, 0, 0);

        if (pDate > now) {
          nextFound = item;
          targetNextPrayerTime = pDate;
          break;
        }
      }

      // Handle midnight rollover to tomorrow's Fajr
      if (!nextFound) {
        nextFound = timeline[0];
        const cleanTime = nextFound.time.split(' ')[0];
        const [h, m] = cleanTime.split(':').map(Number);
        const tomorrow = new Date(now);
        tomorrow.setDate(now.getDate() + 1);
        tomorrow.setHours(h, m, 0, 0);
        targetNextPrayerTime = tomorrow;
      }

      targetNextPrayerName = nextFound.id.toUpperCase();
      const activeBox = document.getElementById(`box-${nextFound.id}`);
      if (activeBox) activeBox.classList.add('highlighted-active');

      updateCountdownClock();
    }

    function updateCountdownClock() {
      if (!targetNextPrayerTime) {
        document.getElementById('countdownBlock').textContent = "Next: --:--";
        return;
      }

      const rightNow = new Date();
      const millisecondDiff = targetNextPrayerTime - rightNow;

      if (millisecondDiff <= 0) {
        evaluateNextPrayerAndHighlight();
        return;
      }

      const totalSeconds = Math.floor(millisecondDiff / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);

      document.getElementById('countdownBlock').textContent = 
        `${targetNextPrayerName}: -${hours}h ${minutes}m`;
    }

    // Startup
    initFromLocalStorage();
    manualSyncPipelines();

    // Core Intervals
    setInterval(manualSyncPipelines, 15 * 60 * 1000); // 15-minute sync
    setInterval(updateCountdownClock, 1000);          // 1-second live countdown
  </script>
</body>
</html>
