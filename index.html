<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Max-Area Currency & Salah Widget</title>
  <style>
    :root {
      /* High-energy neon futuristic color palette */
      --bg-gradient: linear-gradient(145deg, #090514 0%, #130a2a 100%);
      --neon-cyan: #00f0ff;
      --neon-magenta: #ff007f;
      --neon-green: #39ff14;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text-white: #ffffff;
      --text-gray: #a0aec0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body, html {
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    /* Utilizes 100% of the available widget screen space with zero wasted margins */
    .widget-canvas {
      width: 100vw;
      height: 100vh;
      padding: 10px;
      background: var(--bg-gradient);
      border: 2px solid rgba(255, 0, 127, 0.25);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: inset 0 0 20px rgba(0, 240, 255, 0.15);
    }

    /* Row 1: Header Meta */
    .widget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .meta-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: clamp(0.65rem, 3.2vw, 0.95rem);
      font-weight: 800;
      color: var(--neon-cyan);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pulse-node {
      width: 8px;
      height: 8px;
      background-color: var(--neon-green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--neon-green);
      animation: rapidPulse 1.5s infinite;
    }

    @keyframes rapidPulse {
      0%, 100% { opacity: 0.5; transform: scale(0.9); }
      50% { opacity: 1; transform: scale(1.15); }
    }

    .sync-timestamp {
      font-size: clamp(0.55rem, 2.8vw, 0.8rem);
      color: var(--text-gray);
      font-weight: 600;
    }

    /* Row 2: Massive Exchange Block */
    .forex-block {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-grow: 1.5;
      margin: 6px 0;
    }

    .pair-ident {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .flag-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .flag-circle {
      width: clamp(22px, 6vw, 32px);
      height: clamp(22px, 6vw, 32px);
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ffffff;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.3);
    }

    .pair-lbl {
      font-size: clamp(0.85rem, 4vw, 1.3rem);
      font-weight: 900;
      color: var(--text-white);
      letter-spacing: -0.5px;
    }

    /* Extreme typography sizing using clamp to push text elements to maximum safe boundaries */
    .rate-value {
      font-size: clamp(2.4rem, 13.5vw, 4.6rem);
      font-weight: 950;
      color: var(--neon-cyan);
      text-shadow: 0 0 15px rgba(0, 240, 255, 0.45);
      letter-spacing: -2px;
      line-height: 0.85;
      text-align: right;
    }

    /* Row 3: Grid of Salah Timings */
    .salah-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      flex-grow: 2;
    }

    .salah-slot {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4px;
      transition: all 0.3s ease;
    }

    .slot-title {
      font-size: clamp(0.58rem, 3.2vw, 0.92rem);
      font-weight: 700;
      text-transform: uppercase;
      color: var(--text-gray);
      letter-spacing: 0.5px;
    }

    .slot-time {
      font-size: clamp(0.85rem, 4.8vw, 1.45rem);
      font-weight: 900;
      color: var(--text-white);
      margin-top: 1px;
    }

    /* Highlight next Salah: Hot pink and violet gradient with glowing edges and yellow text */
    .highlight-next {
      background: linear-gradient(135deg, var(--neon-magenta) 0%, #7c3aed 100%) !important;
      border: 2px solid var(--neon-magenta) !important;
      box-shadow: 0 0 16px rgba(255, 0, 127, 0.75);
      animation: dynamicGlow 2.5s infinite alternate;
    }

    .highlight-next .slot-title {
      color: #ffffff !important;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    }

    .highlight-next .slot-time {
      color: #ffff00 !important; /* Striking yellow time display */
      text-shadow: 0 0 8px rgba(255, 255, 0, 0.6);
    }

    @keyframes dynamicGlow {
      0% { box-shadow: 0 0 8px rgba(255, 0, 127, 0.5); }
      100% { box-shadow: 0 0 20px rgba(255, 0, 127, 0.95); }
    }
  </style>
</head>
<body>

  <div class="widget-canvas" onclick="refreshAllPipelines()">
    <!-- Top Row -->
    <div class="widget-header">
      <div class="meta-badge">
        <span class="pulse-node"></span>
        <span id="geoLabel">Riyadh</span>
      </div>
      <div class="sync-timestamp" id="lastSync">Syncing...</div>
    </div>

    <!-- Middle Row: Giant Rate Display -->
    <div class="forex-block">
      <div class="pair-ident">
        <div class="flag-group">
          <img src="https://flagcdn.com/w80/sa.png" class="flag-circle" alt="Saudi Arabia">
          <img src="https://flagcdn.com/w80/in.png" class="flag-circle" alt="India">
        </div>
        <span class="pair-lbl">SAR/INR</span>
      </div>
      <div class="rate-value" id="rateOutput">--.----</div>
    </div>

    <!-- Bottom Row: Dynamic 3x2 Grid -->
    <div class="salah-grid">
      <div class="salah-slot" id="slot-fajr">
        <span class="slot-title">Fajr</span>
        <span class="slot-time" id="t-fajr">--:--</span>
      </div>
      <div class="salah-slot" id="slot-sunrise">
        <span class="slot-title">Sunrise</span>
        <span class="slot-time" id="t-sunrise">--:--</span>
      </div>
      <div class="salah-slot" id="slot-dhuhr">
        <span class="slot-title">Dhuhr</span>
        <span class="slot-time" id="t-dhuhr">--:--</span>
      </div>
      <div class="salah-slot" id="slot-asr">
        <span class="slot-title">Asr</span>
        <span class="slot-time" id="t-asr">--:--</span>
      </div>
      <div class="salah-slot" id="slot-maghrib">
        <span class="slot-title">Maghrib</span>
        <span class="slot-time" id="t-maghrib">--:--</span>
      </div>
      <div class="salah-slot" id="slot-isha">
        <span class="slot-title">Isha</span>
        <span class="slot-time" id="t-isha">--:--</span>
      </div>
    </div>
  </div>

  <script>
    const EXCHANGE_API = 'https://open.er-api.com/v6/latest/SAR';
    const PRAYER_API_BASE = 'https://api.aladhan.com/v1/timings';
    
    // Default safe fallback (Riyadh, KSA)
    const BASE_LAT = 24.7136;
    const BASE_LNG = 46.6753;
    const BASE_CITY = "Riyadh";

    let cachedTimings = null;

    function initCache() {
      if(localStorage.getItem('max_rate')) document.getElementById('rateOutput').textContent = localStorage.getItem('max_rate');
      if(localStorage.getItem('max_geo')) document.getElementById('geoLabel').textContent = localStorage.getItem('max_geo');
      
      const slots = ['fajr', 'sunrise', 'dhuhr', 'asr', 'maghrib', 'isha'];
      let cachedTimesObj = {};
      slots.forEach(slot => {
        const val = localStorage.getItem(`max_t_${slot}`);
        if(val) {
          document.getElementById(`t-${slot}`).textContent = val;
          // Format keys to match API structure for the highlight evaluator
          const apiKeyName = slot.charAt(0).toUpperCase() + slot.slice(1);
          cachedTimesObj[apiKeyName] = val;
        }
      });
      if (Object.keys(cachedTimesObj).length === 6) {
        cachedTimings = cachedTimesObj;
        evaluateAndHighlightNextSalah();
      }
      if(localStorage.getItem('max_sync')) document.getElementById('lastSync').textContent = localStorage.getItem('max_sync');
    }

    async function refreshAllPipelines() {
      await getExchangeRate();
      await fetchLocationAndSalah();
    }

    async function getExchangeRate() {
      try {
        const res = await fetch(EXCHANGE_API);
        if (!res.ok) throw new Error();
        const data = await res.json();
        const rate = data.rates.INR;
        if(rate) {
          const precisionRate = rate.toFixed(4);
          document.getElementById('rateOutput').textContent = precisionRate;
          localStorage.setItem('max_rate', precisionRate);
        }
      } catch(e) { console.error("Exchange fetch failure", e); }
    }

    async function fetchLocationAndSalah() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => { getSalahData(pos.coords.latitude, pos.coords.longitude, "Auto GPS"); },
          () => { fetchLocationByIP(); },
          { timeout: 5000 }
        );
      } else {
        fetchLocationByIP();
      }
    }

    async function fetchLocationByIP() {
      try {
        const res = await fetch('https://ipapi.co/json/');
        if(!res.ok) throw new Error();
        const data = await res.json();
        if(data.latitude && data.longitude) {
          getSalahData(data.latitude, data.longitude, data.city || "Auto IP");
        } else { throw new Error(); }
      } catch(e) {
        getSalahData(BASE_LAT, BASE_LNG, BASE_CITY);
      }
    }

    async function getSalahData(lat, lng, label) {
      try {
        const dateISO = new Date().toISOString().split('T')[0];
        // Utilizing Umm Al-Qura (Method 4) calculation natively for Middle East accuracy
        const res = await fetch(`${PRAYER_API_BASE}/${dateISO}?latitude=${lat}&longitude=${lng}&method=4`);
        if(!res.ok) throw new Error();
        
        const payload = await res.json();
        const timings = payload.data.timings;
        
        document.getElementById('geoLabel').textContent = label;
        localStorage.setItem('max_geo', label);

        const targetKeys = {
          'fajr': timings.Fajr,
          'sunrise': timings.Sunrise,
          'dhuhr': timings.Dhuhr,
          'asr': timings.Asr,
          'maghrib': timings.Maghrib,
          'isha': timings.Isha
        };

        cachedTimings = timings;

        for (const [key, val] of Object.entries(targetKeys)) {
          if(val) {
            document.getElementById(`t-${key}`).textContent = val;
            localStorage.setItem(`max_t_${key}`, val);
          }
        }

        evaluateAndHighlightNextSalah();

        const stamp = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        document.getElementById('lastSync').textContent = stamp;
        localStorage.setItem('max_sync', stamp);

      } catch(e) { console.error("Salah fetch failure", e); }
    }

    function evaluateAndHighlightNextSalah() {
      if (!cachedTimings) return;
      
      const now = new Date();
      
      // Mandatory daily Salah slots to evaluate (excl. Shuruq/Sunrise)
      const prayers = [
        { name: 'fajr', time: cachedTimings.Fajr },
        { name: 'dhuhr', time: cachedTimings.Dhuhr },
        { name: 'asr', time: cachedTimings.Asr },
        { name: 'maghrib', time: cachedTimings.Maghrib },
        { name: 'isha', time: cachedTimings.Isha }
      ];

      // Remove existing highlighted tags
      const allCards = ['fajr', 'sunrise', 'dhuhr', 'asr', 'maghrib', 'isha'];
      allCards.forEach(id => {
        const el = document.getElementById(`slot-${id}`);
        if(el) el.classList.remove('highlight-next');
      });

      let nextPrayer = null;

      for (let p of prayers) {
        if (!p.time) continue;
        const [hrs, mins] = p.time.split(':').map(Number);
        const prayerDate = new Date(now);
        prayerDate.setHours(hrs, mins, 0, 0);

        if (prayerDate > now) {
          nextPrayer = p.name;
          break;
        }
      }

      // If all prayers for today have passed, the next active prayer is Fajr tomorrow
      if (!nextPrayer) {
        nextPrayer = 'fajr';
      }

      const nextEl = document.getElementById(`slot-${nextPrayer}`);
      if (nextEl) {
        nextEl.classList.add('highlight-next');
      }
    }

    // Run Initialization
    initCache();
    refreshAllPipelines();

    // Constant background polling loops
    setInterval(refreshAllPipelines, 15 * 60 * 1000); // System check every 15 minutes
    setInterval(evaluateAndHighlightNextSalah, 60 * 1000); // Check upcoming Salah every minute
  </script>
</body>
</html>
